<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>猫咪大作战 - 战斗Demo</title>
  <style>
    :root {
      color-scheme: light;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1d2a35;
      color: #fff;
      padding: 12px;
    }
    .app-shell {
      display: flex;
      align-items: flex-start;
      gap: 24px;
      width: min(100%, 1160px);
      justify-content: center;
    }
    .frame {
      position: relative;
      width: min(100vw - 24px, calc((100vh - 24px) * 0.45));
      aspect-ratio: 720 / 1600;
      border: 2px solid #ffffff40;
      border-radius: 18px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 20px 45px #00000066;
      touch-action: none;
    }
    .load-overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(165deg, #0f172a 0%, #1a2740 100%);
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }
    .load-overlay.load-overlay--done {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .tutorial-overlay {
      position: absolute;
      inset: 0;
      z-index: 25;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      background: rgba(5, 14, 32, 0.9);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.32s ease, visibility 0.32s ease;
    }
    .tutorial-overlay.tutorial-overlay--show {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }
    .tutorial-card {
      width: min(100%, 440px);
      max-height: min(88%, 800px);
      overflow: auto;
      border-radius: 16px;
      border: 2px solid rgba(255, 255, 255, 0.32);
      background: linear-gradient(165deg, #153354 0%, #0a1522 100%);
      padding: 20px 18px 16px;
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.55);
    }
    .tutorial-title {
      font-size: 22px;
      font-weight: 800;
      color: #e8f4ff;
      text-align: center;
      margin-bottom: 14px;
      letter-spacing: 0.04em;
    }
    .tutorial-list {
      list-style: none;
      margin: 0 0 16px;
      padding: 0;
      font-size: 15px;
      line-height: 1.55;
      color: #d0e5ff;
    }
    .tutorial-list li {
      position: relative;
      padding: 0 0 0 1.1em;
      margin-bottom: 10px;
    }
    .tutorial-list li::before {
      content: "·";
      position: absolute;
      left: 0;
      color: #6ec5ff;
      font-weight: 800;
    }
    .tutorial-btn {
      width: 100%;
      border: 1px solid #b71c1c;
      border-radius: 12px;
      background: #e53935;
      color: #fff7f5;
      padding: 12px 14px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      transition: filter 0.12s ease, transform 0.12s ease;
    }
    .tutorial-btn:hover {
      filter: brightness(1.08);
    }
    .tutorial-btn:active {
      transform: scale(0.99);
    }
    .load-box {
      width: min(86%, 400px);
      text-align: center;
      padding: 20px 16px;
    }
    .load-title {
      font-size: 22px;
      font-weight: 700;
      color: #e8f4ff;
      margin-bottom: 18px;
    }
    .load-bar-outer {
      height: 12px;
      border-radius: 999px;
      background: #ffffff22;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .load-bar-inner {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, #3d8bfd, #67e8a8);
      transition: width 0.2s ease-out;
    }
    .load-hint {
      font-size: 15px;
      color: #a8c4e8;
    }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .debug-panel {
      display: none; /* 发布时隐藏；需要调试时改回 display:flex 并补全下方布局 */
      width: 260px;
      min-height: 280px;
      border: 2px solid #ffffff55;
      border-radius: 14px;
      background: #0f1c2be0;
      box-shadow: 0 10px 28px #00000066;
      padding: 14px;
      flex-direction: column;
      gap: 12px;
    }
    .debug-panel-block {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .debug-panel-skills {
      margin-top: 2px;
      padding-top: 12px;
      border-top: 1px solid #ffffff33;
    }
    .debug-panel-title {
      font-size: 20px;
      font-weight: 700;
      color: #d8ebff;
    }
    .debug-panel-subtitle {
      font-size: 17px;
      font-weight: 700;
      color: #a8d4ff;
    }
    .debug-panel-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .debug-btn {
      border: 1px solid #ffffff80;
      border-radius: 10px;
      background: #2ecc71;
      color: #103717;
      padding: 10px 12px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, filter 0.12s ease;
    }
    .debug-btn:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }
    .debug-btn:active {
      transform: translateY(0);
    }
    .debug-btn-boss {
      background: #e67e22;
      color: #2a1203;
    }
    .debug-btn-boss:hover {
      filter: brightness(1.06);
    }
    .debug-btn-round2 {
      background: #3498db;
      color: #0b1f2e;
    }
    .debug-btn-round2:hover {
      filter: brightness(1.06);
    }
    .cat-test-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .cat-test-btn {
      border: 1px solid #ffffff66;
      border-radius: 8px;
      background: #1f3f67;
      color: #e6f2ff;
      padding: 8px 6px;
      font-size: 12px;
      line-height: 1.2;
      font-weight: 700;
      white-space: normal;
      cursor: pointer;
      transition: filter 0.12s ease, transform 0.12s ease;
    }
    .cat-test-btn:hover {
      filter: brightness(1.08);
      transform: translateY(-1px);
    }
    .cat-test-btn:active {
      transform: translateY(0);
    }
    .cat-tooltip {
      position: fixed;
      z-index: 30;
      max-width: 280px;
      pointer-events: none;
      border: 1px solid #ffffff4a;
      border-radius: 10px;
      background: #061424f2;
      color: #e7f2ff;
      box-shadow: 0 10px 28px #00000066;
      padding: 9px 10px;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-line;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.14s ease, transform 0.14s ease;
    }
    .cat-tooltip.show {
      opacity: 1;
      transform: translateY(0);
    }
    .debug-params {
      display: none;
      border: 1px solid #ffffff2e;
      border-radius: 10px;
      background: #07111dcc;
      padding: 10px;
      max-height: 520px;
      overflow: auto;
      font-size: 12px;
      line-height: 1.5;
      color: #d6e8ff;
      white-space: pre-wrap;
      word-break: break-all;
    }
    @media (max-width: 980px) {
      .app-shell {
        flex-direction: column;
        align-items: center;
      }
      .debug-panel {
        width: min(96vw, 560px);
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="frame">
      <div class="load-overlay" id="loadOverlay" aria-live="polite" aria-busy="true">
        <div class="load-box">
          <div class="load-title">加载资源</div>
          <div class="load-bar-outer" role="progressbar" aria-valuemin="0" aria-valuemax="100" id="loadBarOuter">
            <div class="load-bar-inner" id="loadBarInner"></div>
          </div>
          <div class="load-hint" id="loadHint">0 / 31 · 0%</div>
        </div>
      </div>
      <canvas id="game" width="720" height="1600"></canvas>
      <div
        class="tutorial-overlay"
        id="tutorialOverlay"
        role="dialog"
        aria-modal="true"
        aria-hidden="true"
        aria-labelledby="tutorialTitle"
      >
        <div class="tutorial-card">
          <h2 class="tutorial-title" id="tutorialTitle">新手指引</h2>
          <ul class="tutorial-list">
            <li>长按屏幕，瞄准老鼠，松手发射</li>
            <li>通过子弹反弹及不同猫咪子弹的配合消灭怪物</li>
            <li>本版本为试玩demo，共计5关</li>
          </ul>
          <button type="button" class="tutorial-btn" id="tutorialDismissBtn">知道了，开始</button>
        </div>
      </div>
    </div>
    <aside class="debug-panel">
      <section class="debug-panel-block">
        <div class="debug-panel-title">调试面板</div>
        <div class="debug-panel-actions">
          <button id="debugRestartBtn" class="debug-btn" type="button">重新开始</button>
          <button
            id="debugRound2Btn"
            class="debug-btn debug-btn-round2"
            type="button"
            title="从第2关第1波开始；本关2波全部清空后会正常进入第3关（与正常开局后连续通关相同）。"
          >
            第2关
          </button>
          <button id="debugBossLevelBtn" class="debug-btn debug-btn-boss" type="button">boss关</button>
          <button
            id="debugHideChestBtn"
            class="debug-btn"
            type="button"
            title="移除场上所有宝箱怪，不触发肉鸽；本局不再刷出宝箱。点「重新开始」或刷新页面后恢复。"
          >
            隐藏宝箱怪
          </button>
        </div>
      </section>
      <section class="debug-panel-block debug-panel-skills">
        <div class="debug-panel-subtitle">技能调试</div>
        <div class="cat-test-grid">
          <button class="cat-test-btn" type="button" data-cat-name="雀喵">雀喵</button>
          <button class="cat-test-btn" type="button" data-cat-name="豹喵">豹喵</button>
          <button class="cat-test-btn" type="button" data-cat-name="狸花喵">狸花喵</button>
          <button class="cat-test-btn" type="button" data-cat-name="阿比喵">阿比喵</button>
          <button class="cat-test-btn" type="button" data-cat-name="蓝喵">蓝喵</button>
        </div>
      </section>
      <div id="catTooltip" class="cat-tooltip" role="tooltip" aria-hidden="true"></div>
      <div id="debugParams" class="debug-params"></div>
    </aside>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const W = canvas.width;
    const H = canvas.height;
    const BATTLE_TOP = 360;
    const BATTLE_BOTTOM = 1520;
    const PLAYER_LINE_Y = 330;
    const HP_BAR_HEIGHT = 28;
    const HP_BAR_BOTTOM = PLAYER_LINE_Y - 10;
    const HP_BAR_TOP = HP_BAR_BOTTOM - HP_BAR_HEIGHT;
    /** 进攻型老鼠子弹：竖直向上，命中玩家绿色血条区域扣血（与血条绘制 40, HP_BAR_TOP, W-80 对齐） */
    const HP_BAR_HIT_X = 40;
    const HP_BAR_HIT_W = W - 80;
    const ENEMY_BULLET_SPEED = 920;
    /** 命中玩家血条区域用（可与贴图显示大小解耦） */
    const ENEMY_BULLET_RADIUS = 14;
    const ENEMY_BULLET_DAMAGE = 12;
    const HUD_ROUND_FONT_PX = Math.round(15 * 1.2);
    const HUD_TITLE_FONT_PX = HUD_ROUND_FONT_PX * 2;
    const HP_TEXT_FONT_PX = Math.round(18 * 1.2);
    const HP_TEXT_FONT = `bold ${HP_TEXT_FONT_PX}px Microsoft YaHei`;
    /** 回合技能提示：血条下、战场分隔线（PLAYER_LINE）上 */
    const TURN_HINT_FONT_PX = Math.round(21 * 1.05);
    const TURN_HINT_LINE_H = 30;
    const HUD_PROGRESS_BAR_Y = 90;
    const HUD_PROGRESS_BAR_H = 24;
    const HUD_PROGRESS_TEXT_Y = HUD_PROGRESS_BAR_Y + HUD_PROGRESS_BAR_H / 2;
    const SHOOT_ORIGIN = { x: W / 2, y: PLAYER_LINE_Y + 14 };
    /** 阿比喵追踪弹：从猫卡片锚点略偏下（胸口一带）出现，再侧上甩弧、下砸 */
    const ABI_HOMING_SPAWN_BODY_OFFSET_Y = 18;
    /** 蓝喵：每次击杀触发追踪大火球数量 */
    const BLUE_KILL_FIREBALL_COUNT = 3;
    const BLUE_FIREBALL_HIT_DAMAGE_MIN = 15;
    const BLUE_FIREBALL_HIT_DAMAGE_MAX = 30;
    const BLUE_FIREBALL_EXPLOSION_DAMAGE_MIN = 7;
    const BLUE_FIREBALL_EXPLOSION_DAMAGE_MAX = 14;
    /** 从距离蓝喵最近的若干只怪里洗牌后取目标；池子越大随机性越强 */
    const BLUE_FIREBALL_NEAREST_POOL = 8;
    /** 连续 3 发火球生成间隔（秒），避免同帧叠在一起 */
    const BLUE_FIREBALL_SPAWN_STAGGER_SEC = 0.14;
    /** 蓝喵火球贴图：1 = 与 lanFire 基线倍率（1.12）一致，即原始贴图大小 */
    const BLUE_FIREBALL_SPRITE_DRAW_MULT = 1;
    /** 猫头像行：尽量占满画布宽度，单猫宽度由 slot 动态算，避免相邻卡片重叠 */
    const CAT_HUD_LEFT = 6;
    const CAT_HUD_WIDTH = 708;
    const CAT_HUD_Y = 208;
    const CAT_AVATAR_RX = 70;
    const CAT_AVATAR_RY = 56;
    const CAT_AVATAR_RING_R = 80;
    const HUD_FOCUS_FLASH_DURATION = 0.18;
    const HUD_FOCUS_FLOAT_AMPLITUDE = 2.6;
    const HUD_FOCUS_FLOAT_SPEED = 5.4;
    const HUD_THEME = {
      title: "#f7f7f7",
      progressTrack: "#6a320d",
      progressStroke: "#f4b400",
      progressFill: "#f2c94c",
      roundText: "#e8f5ff",
      cardFillActive: "#f7fdffe8",
      cardFillIdle: "#eef7ffcf",
      cardStroke: "#d8e6f8",
      cardGlow: "rgba(110,195,255,0.32)",
      hpTrack: "#2f5233",
      hpTrackStroke: "#ffffff80",
      hpFill: "#67e06a",
      hpText: "#ffffff",
      hpTextStroke: "#000000"
    };
    const MONSTER_COLS = 6;
    const CELL_W = W / MONSTER_COLS;
    const CELL_H = 130;
    const MONSTER_ROW_MOVE_DURATION = 0.52;
    const MONSTER_ROW_JUMP_PX = 24;
    /** 上移过程透视感：中间略放大，落地恢复 1（不影响碰撞半径） */
    const MONSTER_ROW_MOVE_SCALE_PEAK = 1.12;
    /** 初始/回合刷怪区域起始行（相对原布局整体上移一行，对应图中红区一带） */
    const MONSTER_START_ROW = 3;
    const MONSTER_SPAWN_ROW_COUNT = 5;
    /** 增援两行：绿色行 = 初始 5 行网格最底行；再下一行 = 绿色正下方 */
    const MONSTER_REINFORCE_ROW_GREEN = MONSTER_START_ROW + MONSTER_SPAWN_ROW_COUNT - 1;
    const MONSTER_REINFORCE_ROW_BELOW_GREEN = MONSTER_REINFORCE_ROW_GREEN + 1;
    const MAX_MONSTERS_PER_ROW = 4;
    const MIN_MONSTERS_PER_STAGE = 8;
    const MAX_MONSTERS_PER_STAGE = 15;
    /** 第3～4关每关 2 波；第1～2关与Boss关（第5关）为 1 波 */
    const WAVES_PER_STAGE_NORMAL = 2;
    /** 总关卡数；通关第 5 关后胜利 */
    const MAX_ROUND = 5;
    /** 每升 1 关，怪物生命在现有公式上额外 ×(1+该值)，第 1 关为基准 */
    const MONSTER_HP_STAGE_BONUS_PER_ROUND = 0.1;
    /** 第 1 波：100% 1 只后，再 50% 概率多 1 只；第 2 波：50% 1 只；增援每次 20% 1 只 */
    const CHEST_WAVE1_EXTRA_CHANCE = 0.3;
    const CHEST_WAVE2_CHANCE = 0.7;
    const CHEST_REINFORCE_CHANCE = 0.2;
    /** 怪物整体每上移该步数，在最下沿补 2 行增援（行内 1~4 规则同 buildRowSpawnCols） */
    const STAGE_REINFORCE_MOVE_STEPS = 2;
    /** 每回合最多触发增援次数（每次仍刷 2 行） */
    const STAGE_REINFORCE_PER_ROUND = 2;
    /** 每波增援（每次刷 2 行）有该概率在其中带 1 只炸弹怪 */
    const REINFORCE_BOMB_MOB_CHANCE = 0.6;
    /** 增援怪入场：时长、自下位移（像素） */
    const REINFORCE_SPAWN_DURATION = 0.42;
    const REINFORCE_SPAWN_SLIDE_PX = 44;
    const MONSTER_HP_MIN = 1;
    const MONSTER_HP_MAX = 100;
    const MONSTER_HP_BOSS_MIN = 300;
    const MONSTER_HP_BOSS_MAX = 500;
    /** 相对随机表基础值的血量倍率（所有通过 makeMonster 生成的怪，射手替换用已缩放血量避免重复乘） */
    const MONSTER_HP_GLOBAL_MULT = 2;
    const BULLET_RADIUS_SCALE = 1.2;
    const EGG_RADIUS = 26 * BULLET_RADIUS_SCALE;
    /** 敌弹贴图与猫蛋默认子弹同基准（再乘 ENEMY_BULLET_SPRITE_VISUAL_MULT） */
    const ENEMY_BULLET_SPRITE_DRAW_R = EGG_RADIUS * 1.02;
    /** 长矛素材为竖直（图2：矛尖在贴图上方、+x 朝右）；尖端相对 +x 为 -90°，需 +π/2 使矛尖与飞行方向一致（向上飞时矛尖朝上） */
    const ENEMY_BULLET_SPRITE_ANGLE_OFFSET = Math.PI / 2;
    /** 相对上述基准再放大显示（仅贴图/占位圆，碰撞仍用 ENEMY_BULLET_RADIUS） */
    const ENEMY_BULLET_SPRITE_VISUAL_MULT = 2;
    const EGG_HIT_DAMAGE_MIN = 15;
    const EGG_HIT_DAMAGE_MAX = 30;
    const SPLIT_EGG_HIT_DAMAGE_MIN = 5;
    const SPLIT_EGG_HIT_DAMAGE_MAX = 10;
    /** 狸花喵：横向激光副攻击（主子弹 15~30 的一半，临时数值） */
    const LIHUA_LASER_DAMAGE_MIN = 5;
    const LIHUA_LASER_DAMAGE_MAX = 10;
    const LIHUA_LASER_DURATION = 0.22;
    const MONSTER_RADIUS_NORMAL = 51;
    /** 激光条带半高（仅绘制，约为原视觉粗度的 2 倍）。伤害仍只按 m.row */
    const LIHUA_LASER_HALF_THICKNESS = Math.round(MONSTER_RADIUS_NORMAL * 1.5) * 2;
    const MONSTER_RADIUS_BOSS = 63;
    /** 怪物中心不超出画布下缘的最大行号（增援行 clamp 用） */
    const MONSTER_ROW_MAX = Math.floor((H - BATTLE_TOP - CELL_H * 0.5 - MONSTER_RADIUS_NORMAL - 8) / CELL_H);
    const MONSTER_NORMAL_FACE_FRAC = 0.7;
    const MONSTER_NORMAL_DISPLAY_SCALE = 0.81;
    /** Boss 贴图缩放（相对原 0.74 再 ×1.3 约为当前体量） */
    const MONSTER_BOSS_DISPLAY_SCALE = 0.74 * 1.3;
    const BOUNCE_FORCE_RANDOM_MIN = 1.02;
    const BOUNCE_FORCE_RANDOM_MAX = 1.02;
    const MONSTER_BOUNCE_RANDOM_MIN = 1.02;
    const MONSTER_BOUNCE_RANDOM_MAX = 1.02;
    const MONSTER_MIN_OUTWARD_REBOUND_SPEED = 190;
    const MONSTER_MIN_UPWARD_REBOUND_SPEED = 165;
    const MONSTER_MIN_REBOUND_SPEED = 150;
    const MONSTER_REBOUND_KEEP_RATIO = 0.82;
    const FOLLOWUP_MONSTER_REBOUND_BOOST = 1.18;
    const FOLLOWUP_MONSTER_MIN_REBOUND_SPEED = 210;
    const FOLLOWUP_MONSTER_MIN_UPWARD_REBOUND_SPEED = 200;
    const MONSTER_MIN_TOTAL_REBOUND_SPEED = 0;
    const MONSTER_HIT_COOLDOWN = 0.012;
    const MONSTER_HIT_SHAKE_DURATION = 0.13;
    const MONSTER_HIT_SHAKE_PX = 30;
    /** 受击时相对 1 的缩放脉冲幅度（与晃动同周期，先放大再收回） */
    const MONSTER_HIT_SCALE_PULSE = 0.38;
    /** 受击时白色闪烁峰值不透明度（随后随时间衰减） */
    const MONSTER_HIT_FLASH_ALPHA_MAX = 0.94;
    const HIT_SHAKE_DURATION = 0.12;
    const HIT_SHAKE_STRENGTH = 11;
    const HIT_SHAKE_MAX = 18;
    const SPLIT_TRIGGER_HITS = 3;
    const SPLIT_BULLET_ANGLE_DEG = 18;
    const SPLIT_BULLET_SPEED_FACTOR = 0.92;
    const BOMB_RADIUS = EGG_RADIUS;

    function applyUpwardBounceCap(vx, vy, bounceCount = 0) {
      if (vy >= 0) return vy;
      const capFactor = bounceCount <= 0
        ? FIRST_BOUNCE_UPWARD_SPEED_CAP_FACTOR
        : NEXT_BOUNCE_UPWARD_SPEED_CAP_FACTOR;
      // 仅做【上限截断】，不再每次都乘系数，避免反弹次数越多越被持续削弱
      const totalSpeed = Math.hypot(vx, vy) || Math.abs(vy);
      const upwardCap = totalSpeed * capFactor;
      if (-vy > upwardCap) {
        return -upwardCap;
      }
      return vy;
    }

    function buildRowSpawnCols() {
      const count = randInt(1, MAX_MONSTERS_PER_ROW);
      const useDensePattern = count >= 2 && Math.random() < 0.55;

      // 紧密相连: 连续列段（例如 1,2,3）
      if (useDensePattern) {
        const start = randInt(0, MONSTER_COLS - count);
        return Array.from({ length: count }, (_, i) => start + i);
      }

      // 分散排布: 随机抽列（例如 0,2,5）
      const cols = Array.from({ length: MONSTER_COLS }, (_, i) => i);
      for (let i = cols.length - 1; i > 0; i -= 1) {
        const j = randInt(0, i);
        const t = cols[i];
        cols[i] = cols[j];
        cols[j] = t;
      }
      return cols.slice(0, count);
    }

    function getStageWaveCount() {
      if (state.round === MAX_ROUND) return 1;
      if (state.round <= 2) return 1;
      return WAVES_PER_STAGE_NORMAL;
    }

    function planStage() {
      const waveCount = getStageWaveCount();
      const waves = [];
      for (let i = 0; i < waveCount; i += 1) {
        waves.push(randInt(MIN_MONSTERS_PER_STAGE, MAX_MONSTERS_PER_STAGE));
      }
      const nEvents = waveCount * STAGE_REINFORCE_PER_ROUND;
      const queue = [];
      let reinSum = 0;
      for (let e = 0; e < nEvents; e += 1) {
        const colsA = buildRowSpawnCols();
        const colsB = buildRowSpawnCols();
        queue.push({ colsA, colsB });
        reinSum += colsA.length + colsB.length;
      }
      state.stageWaveCounts = waves;
      state.stageReinforcementQueue = queue;
      const bossSlots = state.round === MAX_ROUND ? 1 : 0;
      state.stageTotalMonsters = waves.reduce((a, b) => a + b, 0) + bossSlots + reinSum;
      state.stageMonstersDefeated = 0;
      state.moveStepsForReinforce = 0;
      state.reinforceCountThisRound = 0;
      state.reinforceBombMobGrantedThisRound = false;
    }

    function buildSpawnSlotsPool() {
      const spawnSlots = [];
      for (let rowOffset = 0; rowOffset < MONSTER_SPAWN_ROW_COUNT; rowOffset += 1) {
        const row = MONSTER_START_ROW + rowOffset;
        const rowCols = buildRowSpawnCols();
        for (const col of rowCols) {
          spawnSlots.push({ col, row });
        }
      }
      for (let i = spawnSlots.length - 1; i > 0; i -= 1) {
        const j = randInt(0, i);
        const t = spawnSlots[i];
        spawnSlots[i] = spawnSlots[j];
        spawnSlots[j] = t;
      }
      return spawnSlots;
    }

    function spawnWaveForStageRound(stageRound) {
      state.reinforceCountThisRound = 0;
      state.reinforceBombMobGrantedThisRound = false;
      const waveMinionCount = state.stageWaveCounts[stageRound - 1];
      const spawnSlots = buildSpawnSlotsPool();
      const list = [];
      const needBoss = state.round === MAX_ROUND && stageRound === 1;
      const targetSize = needBoss ? 1 + waveMinionCount : waveMinionCount;

      if (needBoss) {
        list.push(
          makeMonster(2.5, MONSTER_START_ROW, randInt(MONSTER_HP_BOSS_MIN, MONSTER_HP_BOSS_MAX), "boss")
        );
        for (let i = spawnSlots.length - 1; i >= 0; i -= 1) {
          const slot = spawnSlots[i];
          if (slot.row === MONSTER_START_ROW && (slot.col === 2 || slot.col === 3)) {
            spawnSlots.splice(i, 1);
          }
        }
      }

      while (list.length < targetSize && spawnSlots.length > 0) {
        const slot = spawnSlots.pop();
        list.push(makeMonster(slot.col, slot.row, randInt(MONSTER_HP_MIN, MONSTER_HP_MAX)));
      }
      const nonBossIdx = [];
      for (let i = 0; i < list.length; i += 1) {
        if (list[i].type !== "boss") nonBossIdx.push(i);
      }
      if (nonBossIdx.length > 0) {
        const ri = nonBossIdx[randInt(0, nonBossIdx.length - 1)];
        const replaced = list[ri];
        list[ri] = makeMonster(replaced.col, replaced.row, 1, "bombMob");
      }
      if (stageRound === 1) {
        replaceOneNormalWithChest(list);
        if (Math.random() < CHEST_WAVE1_EXTRA_CHANCE) replaceOneNormalWithChest(list);
      } else if (stageRound === 2) {
        if (Math.random() < CHEST_WAVE2_CHANCE) replaceOneNormalWithChest(list);
      }
      replaceNormalsWithShooterMobs(list, 2);
      for (const m of list) {
        m.reinforceSpawnAge = 0;
      }
      state.monsters.push(...list);
    }

    /** 每波从「普通怪」中随机选 1 只改为宝箱（1 血），不占用进攻型名额 */
    function replaceOneNormalWithChest(list) {
      if (state.debugSuppressChest) return false;
      const idxs = [];
      for (let i = 0; i < list.length; i += 1) {
        if (list[i].type === "normal") idxs.push(i);
      }
      if (idxs.length === 0) return false;
      const ci = idxs[randInt(0, idxs.length - 1)];
      const c = list[ci];
      list[ci] = makeMonster(c.col, c.row, 1, "chest");
      return true;
    }

    /** 每回合固定将若干只普通老鼠替换为会向上射击的进攻型老鼠 */
    function replaceNormalsWithShooterMobs(list, count) {
      const idxs = [];
      for (let i = 0; i < list.length; i += 1) {
        if (list[i].type === "normal") idxs.push(i);
      }
      const n = Math.min(count, idxs.length);
      for (let k = 0; k < n; k += 1) {
        const i = idxs[k];
        const m = list[i];
        list[i] = makeMonster(m.col, m.row, m.hp, "shooterMob", true);
      }
    }

    function spawnReinforcementFromQueue() {
      if (!state.stageReinforcementQueue || state.stageReinforcementQueue.length === 0) return;
      const ev = state.stageReinforcementQueue.shift();
      const { colsA, colsB } = ev;
      const r1 = Math.min(MONSTER_REINFORCE_ROW_GREEN, MONSTER_ROW_MAX);
      let r2 = Math.min(MONSTER_REINFORCE_ROW_BELOW_GREEN, MONSTER_ROW_MAX);
      if (r1 > MONSTER_ROW_MAX) return;
      if (r2 <= r1) r2 = Math.min(r1 + 1, MONSTER_ROW_MAX);
      const batch = [];
      for (const col of colsA) {
        batch.push(makeMonster(col, r1, randInt(MONSTER_HP_MIN, MONSTER_HP_MAX)));
      }
      for (const col of colsB) {
        batch.push(makeMonster(col, r2, randInt(MONSTER_HP_MIN, MONSTER_HP_MAX)));
      }
      if (
        batch.length > 0 &&
        !state.reinforceBombMobGrantedThisRound &&
        Math.random() < REINFORCE_BOMB_MOB_CHANCE
      ) {
        const ri = randInt(0, batch.length - 1);
        const b = batch[ri];
        batch[ri] = makeMonster(b.col, b.row, 1, "bombMob");
        state.reinforceBombMobGrantedThisRound = true;
      }
      if (Math.random() < CHEST_REINFORCE_CHANCE) replaceOneNormalWithChest(batch);
      replaceNormalsWithShooterMobs(batch, 2);
      for (const mon of batch) {
        mon.reinforceSpawnAge = 0;
        state.monsters.push(mon);
      }
    }

    function handleMonstersAllCleared() {
      if (state.stageRound < getStageWaveCount()) {
        state.stageRound += 1;
        spawnWaveForStageRound(state.stageRound);
        if (state.cats.length > 0) {
          state.shooterCursor = (state.shooterCursor + 1) % state.cats.length;
        }
        startTurn();
        return;
      }
      state.stageMonstersDefeated = state.stageTotalMonsters;
      nextStage();
    }

    function shotsPerTurn() {
      // 新规则：每次仅 1 只猫发射 1 发，结算后怪物前进
      return 1;
    }

    function getCurrentShooterCat() {
      if (state.cats.length === 0) return null;
      const idx = state.shooterCursor % state.cats.length;
      return state.cats[idx];
    }

    function getCatAnchor(index) {
      if (state.cats.length === 1) {
        return { x: W / 2, y: CAT_HUD_Y };
      }
      const gap = CAT_HUD_WIDTH / Math.max(1, state.cats.length);
      return {
        x: CAT_HUD_LEFT + gap * index + gap / 2,
        y: CAT_HUD_Y
      };
    }

    function getCurrentShootOrigin() {
      if (state.cats.length === 0) return { x: SHOOT_ORIGIN.x, y: SHOOT_ORIGIN.y };
      const idx = state.shooterCursor % state.cats.length;
      return getCatAnchor(idx);
    }

    function getStageHpMultiplier() {
      return 1 + (state.round - 1) * MONSTER_HP_STAGE_BONUS_PER_ROUND;
    }

    function scaleMonsterHp(baseHp) {
      return Math.max(1, Math.round(baseHp * MONSTER_HP_GLOBAL_MULT * getStageHpMultiplier()));
    }

    function makeMonster(col, row, hp, type = "normal", hpAlreadyScaled = false) {
      const finalHp = hpAlreadyScaled ? hp : scaleMonsterHp(hp);
      const r =
        type === "boss"
          ? MONSTER_RADIUS_BOSS
          : MONSTER_RADIUS_NORMAL;
      return {
        id: crypto.randomUUID(),
        col,
        row,
        x: col * CELL_W + CELL_W * 0.5,
        y: BATTLE_TOP + row * CELL_H + CELL_H * 0.5,
        hp: finalHp,
        maxHp: finalHp,
        radius: r,
        type,
        rowMoveAnim: null,
        rowMoveDisplayScale: 1,
        hitShakeTime: 0,
        hitShakePhase: 0
      };
    }

    function resolveEggBulletSpriteKey({ ownerCatName, damageMin, homingTargetId, blueFireball, rogueRain }) {
      if (rogueRain) return "rainstorm";
      if (homingTargetId && blueFireball) return "blueFire";
      if (homingTargetId && ownerCatName === "阿比喵") return "abiSub";
      if (homingTargetId) return "abi";
      if (damageMin === SPLIT_EGG_HIT_DAMAGE_MIN) return "split";
      if (ownerCatName === "雀喵") return "split";
      if (ownerCatName === "阿比喵") return "abi";
      if (ownerCatName === "蓝喵") return "lanMain";
      return "normal";
    }

    /** 拖尾 / 光效用：区分阿比追踪、阿比主弹、分裂、炸裂、激光猫 */
    function resolveBulletTrailKind(e) {
      if (e.homingTargetId && e.blueFireball) return "lanFire";
      if (e.homingTargetId) return "abiHoming";
      if (e.rogueRain) return "normal";
      if (e.ownerCatName === "阿比喵") return "abi";
      if (e.ownerCatName === "蓝喵") return "lan";
      if (e.ownerCatName === "雀喵" || e.damageMin === SPLIT_EGG_HIT_DAMAGE_MIN) return "split";
      if (e.ownerCatName === "豹喵") return "bomb";
      if (e.ownerCatName === "狸花喵") return "lihua";
      return "normal";
    }

    /** 肉鸽天降暴雨：与主弹道同 volley，非主子弹、固定 3~8 伤、贴图 bulletRainstorm */
    function spawnRogueRainBullets(origin, dir, volleyId, shooterCat) {
      const base = Math.atan2(dir.y, dir.x);
      const name = shooterCat.name;
      for (let i = 0; i < ROGUE_RAIN_COUNT; i += 1) {
        const deg = ROGUE_RAIN_SPREAD_DEG[i] ?? 0;
        const a = base + (deg * Math.PI) / 180;
        const nd = normalize(Math.cos(a), Math.sin(a));
        spawnEgg({
          x: origin.x,
          y: origin.y,
          vx: nd.x * physics.eggInitialSpeed,
          vy: nd.y * physics.eggInitialSpeed,
          ownerCatName: name,
          canSplit: false,
          canBomb: false,
          canLihuaLaser: false,
          damageMin: ROGUE_RAIN_DAMAGE_MIN,
          damageMax: ROGUE_RAIN_DAMAGE_MAX,
          volleyId,
          radius: EGG_RADIUS * 0.9,
          isMainBullet: false,
          rogueRain: true
        });
        volleyAddProjectile(volleyId);
      }
    }

    function spawnSplitEggFrom(parentEgg) {
      for (const sign of [-1, 1]) {
        const angle = (SPLIT_BULLET_ANGLE_DEG * sign * Math.PI) / 180;
        const cos = Math.cos(angle);
        const sin = Math.sin(angle);
        const rvx = parentEgg.vx * cos - parentEgg.vy * sin;
        const rvy = parentEgg.vx * sin + parentEgg.vy * cos;
        const speedScale = SPLIT_BULLET_SPEED_FACTOR * rand(0.95, 1.05);
        spawnEgg({
          x: parentEgg.x,
          y: parentEgg.y,
          vx: rvx * speedScale,
          vy: rvy * speedScale,
          ownerCatName: parentEgg.ownerCatName,
          canSplit: false,
          canBomb: false,
          canLihuaLaser: false,
          damageMin: SPLIT_EGG_HIT_DAMAGE_MIN,
          damageMax: SPLIT_EGG_HIT_DAMAGE_MAX,
          volleyId: parentEgg.volleyId
        });
        const child = state.eggs[state.eggs.length - 1];
        if (child) {
          child.bounceCount = parentEgg.bounceCount || 0;
        }
        volleyAddProjectile(parentEgg.volleyId);
      }
    }

    function maybeSpawnBombFromEgg(egg) {
      if (!egg.canBomb) return;
      const nextTriggerIdx = egg.bombTriggerCount || 0;
      if (nextTriggerIdx >= BOMB_TRIGGER_HITS.length) return;
      if (egg.hitMonsterCount >= BOMB_TRIGGER_HITS[nextTriggerIdx]) {
        spawnBomb({ x: egg.x, y: egg.y, ownerCatName: egg.ownerCatName, volleyId: egg.volleyId });
        volleyAddProjectile(egg.volleyId);
        egg.bombTriggerCount = nextTriggerIdx + 1;
      }
    }

    /** 狸花喵：主球碰到怪物时，在该怪物所在网格行扫一道横向激光（Canvas 临时绘制，无独立贴图） */
    function applyLihuaLaserDamage(volleyId, laserRow) {
      const candidates = state.monsters.filter((m) => m.hp > 0 && m.row === laserRow);
      for (const m of candidates) {
        const live = state.monsters.find((mm) => mm.id === m.id && mm.hp > 0);
        if (!live) continue;
        if (live.type === "bombMob") {
          triggerHitShake();
          addComboHit();
          applyBombExplosionDamageAt(live.x, live.y, { volleyId });
          continue;
        }
        triggerHitShake();
        const damage = randInt(LIHUA_LASER_DAMAGE_MIN, LIHUA_LASER_DAMAGE_MAX);
        live.hp -= damage;
        gameAudio.playHit();
        applyMonsterHitShake(live);
        spawnDamageText(live, damage);
        addComboHit();
        if (live.hp <= 0) {
          state.kills += 1;
          volleyAddKills(volleyId, 1);
          addStageMonsterDefeat(1);
          if (live.type === "chest") queueRogueChestReward();
        }
      }
      state.monsters = state.monsters.filter((mm) => mm.hp > 0);
    }

    function updateLaserBeams(dt) {

    function spawnDamageText(monster, damage) {
      const baseFontSize = monster.type === "boss" ? 44 : 36;
      const anchorX = monster.x;
      const anchorY = monster.y - monster.radius * 0.6;
      const NEAR_TIME = 0.55;
      const NEAR_DIST = 80;
      let n = 0;
      for (const t of state.damageTexts) {
        const ax = t.anchorX != null ? t.anchorX : t.x;
        const ay = t.anchorY != null ? t.anchorY : t.y;
        if (t.age < NEAR_TIME && Math.hypot(ax - anchorX, ay - anchorY) < NEAR_DIST) n += 1;
      }
      const pairIndex = Math.floor(n / 2);
      const placeAbove = n % 2 === 0;
      const offsetY = (placeAbove ? -1 : 1) * (pairIndex + 0.5) * DAMAGE_TEXT_STACK_LINE;
      const offsetX = 0;
      state.damageTexts.push({
        x: anchorX + offsetX,
        y: anchorY + offsetY,
        anchorX,
        anchorY,
        damage,
        age: 0,
        duration: DAMAGE_TEXT_DURATION,
        rise: DAMAGE_TEXT_RISE,
        fontSize: baseFontSize * DAMAGE_TEXT_FONT_SCALE,
        impactSeed: Math.random() * Math.PI * 2
      });
    }

      state.combo.count = 0;

    function pickHighestHpMonster() {
      let best = null;
      let bestHp = -Infinity;
      for (const m of state.monsters) {
        if (m.hp <= 0) continue;
        if (m.hp > bestHp) {
          bestHp = m.hp;
          best = m;
        }
      }
      return best;
    }

    function pickNearestMonsterFrom(spawnX, spawnY) {
      let best = null;
      let bestD2 = Infinity;
      for (const m of state.monsters) {
        if (m.hp <= 0) continue;
        const d2 = (m.x - spawnX) ** 2 + (m.y - spawnY) ** 2;
        if (d2 < bestD2) {
          bestD2 = d2;
          best = m;
        }
      }
      return best;
    }

    /** 在距离最近若干只怪中洗牌后取 count 个目标（怪少时允许重复） */
    function pickBlueFireballTargets(spawnX, spawnY, count) {
      const alive = state.monsters.filter((m) => m.hp > 0);
      if (!alive.length) return [];
      const sorted = [...alive].sort((a, b) => {
        const da = (a.x - spawnX) ** 2 + (a.y - spawnY) ** 2;
        const db = (b.x - spawnX) ** 2 + (b.y - spawnY) ** 2;
        return da - db;
      });
      const poolSize = Math.min(BLUE_FIREBALL_NEAREST_POOL, sorted.length);
      const pool = sorted.slice(0, poolSize);
      for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      const out = [];
      for (let i = 0; i < count; i++) {
        out.push(pool[i % pool.length]);
      }
      return out;
    }

    function abiHomingCubicPoint(p0x, p0y, p1x, p1y, p2x, p2y, p3x, p3y, t) {
      const u = 1 - t;
      const uu = u * u;
      const tt = t * t;
      return {
        x: uu * u * p0x + 3 * uu * t * p1x + 3 * u * tt * p2x + tt * t * p3x,
        y: uu * u * p0y + 3 * uu * t * p1y + 3 * u * tt * p2y + tt * t * p3y
      };
    }

    function abiHomingCubicTangent(p0x, p0y, p1x, p1y, p2x, p2y, p3x, p3y, t) {
      const u = 1 - t;
      const uu = u * u;
      const tt = t * t;
      return {
        dx: 3 * uu * (p1x - p0x) + 6 * u * t * (p2x - p1x) + 3 * tt * (p3x - p2x),
        dy: 3 * uu * (p1y - p0y) + 6 * u * t * (p2y - p1y) + 3 * tt * (p3y - p2y)
      };
    }

    /** 弧线段参数缓动（smoothstep）：起停略软，整条弧线更顺 */
    function abiHomingEaseT(arcT) {
      const u = clamp(arcT, 0, 1);
      return u * u * (3 - 2 * u);
    }

      const abiIdx = state.cats.findIndex((d) => d.name === "阿比喵" && d.skillType === "abiCombo");

      const dx = target.x - spawnX;

      const dist = Math.hypot(dx, dy) || 1;
      const s = physics.eggInitialSpeed;
      state.eggs.push({
        x: spawnX,

        vx: (dx / dist) * s,
        vy: (dy / dist) * s,

        abiArcP0y: spawnY,
        abiArcSide: Math.random() < 0.5 ? -1 : 1,
        abiArcLiftUp: rand(ABI_HOMING_ARC_LIFT_UP_MIN, ABI_HOMING_ARC_LIFT_UP_MAX),
        abiArcLateral1: rand(ABI_HOMING_ARC_LATERAL1_MIN, ABI_HOMING_ARC_LATERAL1_MAX),
        abiArcLiftAboveTarget: rand(ABI_HOMING_ARC_ABOVE_TARGET_MIN, ABI_HOMING_ARC_ABOVE_TARGET_MAX),
        abiArcLateral2: rand(ABI_HOMING_ARC_LATERAL2_MIN, ABI_HOMING_ARC_LATERAL2_MAX),
        abiArcT: 0,
        abiArcDirect: false,
        radius: EGG_RADIUS,
        hitMonsterCount: 0,
        hitCooldown: 0,
        canSplit: false,
        canBomb: false,
        bombTriggerCount: 0,
        hasSplit: false,
        ownerCatName: "阿比喵",
        bounceCount: 0,
        damageMin: EGG_HIT_DAMAGE_MIN,
        damageMax: EGG_HIT_DAMAGE_MAX,
        homingTargetId: target.id,
        bulletSpriteKey: resolveEggBulletSpriteKey({

        }),

      });
