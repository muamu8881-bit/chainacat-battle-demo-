<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>猫咪大作战 - 战斗Demo（腾讯云 COS 资源）</title>
  <style>
    :root {
      color-scheme: light;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1d2a35;
      color: #fff;
      padding: 12px;
    }
    .app-shell {
      display: flex;
      align-items: flex-start;
      gap: 24px;
      width: min(100%, 1160px);
      justify-content: center;
    }
    .frame {
      position: relative;
      width: min(100vw - 24px, calc((100vh - 24px) * 0.45));
      aspect-ratio: 720 / 1600;
      border: 2px solid #ffffff40;
      border-radius: 18px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 20px 45px #00000066;
      touch-action: none;
    }
    .load-overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(165deg, #0f172a 0%, #1a2740 100%);
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }
    .load-overlay.load-overlay--done {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .load-box {
      width: min(86%, 400px);
      text-align: center;
      padding: 20px 16px;
    }
    .load-title {
      font-size: 22px;
      font-weight: 700;
      color: #e8f4ff;
      margin-bottom: 18px;
    }
    .load-bar-outer {
      height: 12px;
      border-radius: 999px;
      background: #ffffff22;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .load-bar-inner {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, #3d8bfd, #67e8a8);
      transition: width 0.2s ease-out;
    }
    .load-hint {
      font-size: 15px;
      color: #a8c4e8;
    }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .debug-panel {
      width: 260px;
      min-height: 280px;
      border: 2px solid #ffffff55;
      border-radius: 14px;
      background: #0f1c2be0;
      box-shadow: 0 10px 28px #00000066;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .debug-panel-block {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .debug-panel-skills {
      margin-top: 2px;
      padding-top: 12px;
      border-top: 1px solid #ffffff33;
    }
    .debug-panel-title {
      font-size: 20px;
      font-weight: 700;
      color: #d8ebff;
    }
    .debug-panel-subtitle {
      font-size: 17px;
      font-weight: 700;
      color: #a8d4ff;
    }
    .debug-panel-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .debug-btn {
      border: 1px solid #ffffff80;
      border-radius: 10px;
      background: #2ecc71;
      color: #103717;
      padding: 10px 12px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, filter 0.12s ease;
    }
    .debug-btn:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }
    .debug-btn:active {
      transform: translateY(0);
    }
    .debug-btn-boss {
      background: #e67e22;
      color: #2a1203;
    }
    .debug-btn-boss:hover {
      filter: brightness(1.06);
    }
    .debug-btn-round2 {
      background: #3498db;
      color: #0b1f2e;
    }
    .debug-btn-round2:hover {
      filter: brightness(1.06);
    }
    .duck-test-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .duck-test-btn {
      border: 1px solid #ffffff66;
      border-radius: 8px;
      background: #1f3f67;
      color: #e6f2ff;
      padding: 8px 6px;
      font-size: 12px;
      line-height: 1.2;
      font-weight: 700;
      white-space: normal;
      cursor: pointer;
      transition: filter 0.12s ease, transform 0.12s ease;
    }
    .duck-test-btn:hover {
      filter: brightness(1.08);
      transform: translateY(-1px);
    }
    .duck-test-btn:active {
      transform: translateY(0);
    }
    .duck-tooltip {
      position: fixed;
      z-index: 30;
      max-width: 280px;
      pointer-events: none;
      border: 1px solid #ffffff4a;
      border-radius: 10px;
      background: #061424f2;
      color: #e7f2ff;
      box-shadow: 0 10px 28px #00000066;
      padding: 9px 10px;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-line;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.14s ease, transform 0.14s ease;
    }
    .duck-tooltip.show {
      opacity: 1;
      transform: translateY(0);
    }
    .debug-params {
      display: none;
      border: 1px solid #ffffff2e;
      border-radius: 10px;
      background: #07111dcc;
      padding: 10px;
      max-height: 520px;
      overflow: auto;
      font-size: 12px;
      line-height: 1.5;
      color: #d6e8ff;
      white-space: pre-wrap;
      word-break: break-all;
    }
    @media (max-width: 980px) {
      .app-shell {
        flex-direction: column;
        align-items: center;
      }
      .debug-panel {
        width: min(96vw, 560px);
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="frame">
      <div class="load-overlay" id="loadOverlay" aria-live="polite" aria-busy="true">
        <div class="load-box">
          <div class="load-title">加载资源</div>
          <div class="load-bar-outer" role="progressbar" aria-valuemin="0" aria-valuemax="100" id="loadBarOuter">
            <div class="load-bar-inner" id="loadBarInner"></div>
          </div>
          <div class="load-hint" id="loadHint">0 / 12 · 0%</div>
        </div>
      </div>
      <canvas id="game" width="720" height="1600"></canvas>
    </div>
    <aside class="debug-panel">
      <section class="debug-panel-block">
        <div class="debug-panel-title">调试面板</div>
        <div class="debug-panel-actions">
          <button id="debugRestartBtn" class="debug-btn" type="button">重新开始</button>
          <button
            id="debugRound2Btn"
            class="debug-btn debug-btn-round2"
            type="button"
            title="从第2关第1回合开始；本关全部波次清空后会正常进入第3关（与正常开局后连续通关相同）。"
          >
            第2关
          </button>
          <button id="debugBossLevelBtn" class="debug-btn debug-btn-boss" type="button">boss关</button>
        </div>
      </section>
      <section class="debug-panel-block debug-panel-skills">
        <div class="debug-panel-subtitle">技能调试</div>
        <div class="duck-test-grid">
          <button class="duck-test-btn" type="button" data-duck-name="雀喵">雀喵</button>
          <button class="duck-test-btn" type="button" data-duck-name="豹喵">豹喵</button>
          <button class="duck-test-btn" type="button" data-duck-name="狸花喵">狸花喵</button>
          <button class="duck-test-btn" type="button" data-duck-name="阿比喵">阿比喵</button>
        </div>
      </section>
      <div id="duckTooltip" class="duck-tooltip" role="tooltip" aria-hidden="true"></div>
      <div id="debugParams" class="debug-params"></div>
    </aside>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const W = canvas.width;
    const H = canvas.height;
    const BATTLE_TOP = 360;
    const BATTLE_BOTTOM = 1520;
    const PLAYER_LINE_Y = 330;
    const HP_BAR_HEIGHT = 28;
    const HP_BAR_BOTTOM = PLAYER_LINE_Y - 10;
    const HP_BAR_TOP = HP_BAR_BOTTOM - HP_BAR_HEIGHT;
    const HUD_ROUND_FONT_PX = Math.round(15 * 1.2);
    const HUD_TITLE_FONT_PX = HUD_ROUND_FONT_PX * 2;
    const HP_TEXT_FONT_PX = Math.round(18 * 1.2);
    const HP_TEXT_FONT = `bold ${HP_TEXT_FONT_PX}px Microsoft YaHei`;
    /** 回合技能提示：血条下、战场分隔线（PLAYER_LINE）上 */
    const TURN_HINT_FONT_PX = Math.round(21 * 1.05);
    const TURN_HINT_LINE_H = 30;
    const HUD_PROGRESS_BAR_Y = 90;
    const HUD_PROGRESS_BAR_H = 24;
    const HUD_PROGRESS_TEXT_Y = HUD_PROGRESS_BAR_Y + HUD_PROGRESS_BAR_H / 2;
    const SHOOT_ORIGIN = { x: W / 2, y: PLAYER_LINE_Y + 14 };
    const DUCK_HUD_LEFT = 28;
    const DUCK_HUD_WIDTH = 664;
    const DUCK_HUD_Y = 208;
    const DUCK_AVATAR_RX = 70;
    const DUCK_AVATAR_RY = 56;
    const DUCK_AVATAR_RING_R = 80;
    const HUD_FOCUS_FLASH_DURATION = 0.18;
    const HUD_FOCUS_FLOAT_AMPLITUDE = 2.6;
    const HUD_FOCUS_FLOAT_SPEED = 5.4;
    const HUD_THEME = {
      title: "#f7f7f7",
      progressTrack: "#6a320d",
      progressStroke: "#f4b400",
      progressFill: "#f2c94c",
      roundText: "#e8f5ff",
      cardFillActive: "#f7fdffe8",
      cardFillIdle: "#eef7ffcf",
      cardStroke: "#d8e6f8",
      cardGlow: "rgba(110,195,255,0.32)",
      hpTrack: "#2f5233",
      hpTrackStroke: "#ffffff80",
      hpFill: "#67e06a",
      hpText: "#ffffff",
      hpTextStroke: "#000000"
    };
    const SKILL_BADGE_THEME = {
      splitShot: { text: "裂", color: "#5e6bff" },
      bombShot: { text: "炸", color: "#ff7a45" },
      normal: { text: "普", color: "#2fcf9b" },
      abiCombo: { text: "追", color: "#d48cff" }
    };
    const MONSTER_COLS = 6;
    const CELL_W = W / MONSTER_COLS;
    const CELL_H = 130;
    const MONSTER_ROW_MOVE_DURATION = 0.52;
    const MONSTER_ROW_JUMP_PX = 24;
    /** 上移过程透视感：中间略放大，落地恢复 1（不影响碰撞半径） */
    const MONSTER_ROW_MOVE_SCALE_PEAK = 1.12;
    /** 初始/回合刷怪区域起始行（相对原布局整体上移一行，对应图中红区一带） */
    const MONSTER_START_ROW = 3;
    const MONSTER_SPAWN_ROW_COUNT = 5;
    /** 增援两行：绿色行 = 初始 5 行网格最底行；再下一行 = 绿色正下方 */
    const MONSTER_REINFORCE_ROW_GREEN = MONSTER_START_ROW + MONSTER_SPAWN_ROW_COUNT - 1;
    const MONSTER_REINFORCE_ROW_BELOW_GREEN = MONSTER_REINFORCE_ROW_GREEN + 1;
    const MAX_MONSTERS_PER_ROW = 4;
    const MIN_MONSTERS_PER_STAGE = 8;
    const MAX_MONSTERS_PER_STAGE = 15;
    /** 每关 3 回合：前 2 回合仅小怪，第 3 回合 Boss+小怪 */
    const ROUNDS_PER_STAGE = 3;
    /** 怪物整体每上移该步数，在最下沿补 2 行增援（行内 1~4 规则同 buildRowSpawnCols） */
    const STAGE_REINFORCE_MOVE_STEPS = 2;
    /** 每回合最多触发增援次数（每次仍刷 2 行） */
    const STAGE_REINFORCE_PER_ROUND = 2;
    /** 每波增援（每次刷 2 行）有该概率在其中带 1 只炸弹怪 */
    const REINFORCE_BOMB_MOB_CHANCE = 0.6;
    /** 增援怪入场：时长、自下位移（像素） */
    const REINFORCE_SPAWN_DURATION = 0.42;
    const REINFORCE_SPAWN_SLIDE_PX = 44;
    const MONSTER_HP_MIN = 1;
    const MONSTER_HP_MAX = 100;
    const MONSTER_HP_BOSS_MIN = 300;
    const MONSTER_HP_BOSS_MAX = 500;
    /** 大关总数上限：若改为 2，则通关第 2 大关后即胜利，不会出现第 3 关。 */
    const MAX_ROUND = 20;
    const BULLET_RADIUS_SCALE = 1.2;
    const EGG_RADIUS = 26 * BULLET_RADIUS_SCALE;
    const EGG_HIT_DAMAGE_MIN = 15;
    const EGG_HIT_DAMAGE_MAX = 30;
    const SPLIT_EGG_HIT_DAMAGE_MIN = 5;
    const SPLIT_EGG_HIT_DAMAGE_MAX = 10;
    const MONSTER_RADIUS_NORMAL = 51;
    const MONSTER_RADIUS_BOSS = 63;
    /** 怪物中心不超出画布下缘的最大行号（增援行 clamp 用） */
    const MONSTER_ROW_MAX = Math.floor((H - BATTLE_TOP - CELL_H * 0.5 - MONSTER_RADIUS_NORMAL - 8) / CELL_H);
    const MONSTER_NORMAL_FACE_FRAC = 0.7;
    const MONSTER_NORMAL_DISPLAY_SCALE = 0.81;
    /** Boss 贴图缩放（相对原 0.74 再 ×1.3 约为当前体量） */
    const MONSTER_BOSS_DISPLAY_SCALE = 0.74 * 1.3;
    const BOUNCE_FORCE_RANDOM_MIN = 1.02;
    const BOUNCE_FORCE_RANDOM_MAX = 1.02;
    const MONSTER_BOUNCE_RANDOM_MIN = 1.02;
    const MONSTER_BOUNCE_RANDOM_MAX = 1.02;
    const MONSTER_MIN_OUTWARD_REBOUND_SPEED = 190;
    const MONSTER_MIN_UPWARD_REBOUND_SPEED = 165;
    const MONSTER_MIN_REBOUND_SPEED = 150;
    const MONSTER_REBOUND_KEEP_RATIO = 0.82;
    const FOLLOWUP_MONSTER_REBOUND_BOOST = 1.18;
    const FOLLOWUP_MONSTER_MIN_REBOUND_SPEED = 210;
    const FOLLOWUP_MONSTER_MIN_UPWARD_REBOUND_SPEED = 200;
    const MONSTER_MIN_TOTAL_REBOUND_SPEED = 0;
    const MONSTER_HIT_COOLDOWN = 0.012;
    const MONSTER_HIT_SHAKE_DURATION = 0.13;
    const MONSTER_HIT_SHAKE_PX = 30;
    /** 受击时相对 1 的缩放脉冲幅度（与晃动同周期，先放大再收回） */
    const MONSTER_HIT_SCALE_PULSE = 0.38;
    /** 受击时白色闪烁峰值不透明度（随后随时间衰减） */
    const MONSTER_HIT_FLASH_ALPHA_MAX = 0.94;
    const HIT_SHAKE_DURATION = 0.12;
    const HIT_SHAKE_STRENGTH = 11;
    const HIT_SHAKE_MAX = 18;
    const SPLIT_TRIGGER_HITS = 3;
    const SPLIT_BULLET_ANGLE_DEG = 18;
    const SPLIT_BULLET_SPEED_FACTOR = 0.92;
    const BOMB_RADIUS = EGG_RADIUS;
    /** 仅绘制炸弹子弹贴图用，不影响碰撞与爆炸范围 */
    const BOMB_BULLET_SPRITE_DISPLAY_SCALE = 1.3;
    const BOMB_TRIGGER_HITS = [2, 4, 6];
    const BOMB_TIMER_SECONDS = 1;
    const BOMB_BLAST_RADIUS = BOMB_RADIUS * 10; // 原 2 倍范围，现放大到 5 倍
    const BOMB_HIT_DAMAGE_MIN = 30;
    const BOMB_HIT_DAMAGE_MAX = 60;
    const COMBO_MIN_DISPLAY = 2;
    const COMBO_HOLD_SECONDS_AFTER_CLEAR = 2;
    const COMBO_POP_DURATION = 0.18;
    const COMBO_POP_SCALE_MAX = 0.16;
    /** 多杀横幅：危险区下方战斗区中部，与「连击」区分 */
    const MULTIKILL_BANNER_Y = BATTLE_TOP + 198;
    const MULTIKILL_BAR_WIDTH_RATIO = 0.74;
    /** 背景条高度（44px 字 + 粗描边需额外上下留白） */
    const MULTIKILL_BAR_HEIGHT = 92;
    const MULTIKILL_BAR_CORNER_R = 18;
    const MULTIKILL_DURATION_IN = 0.22;
    const MULTIKILL_DURATION_HOLD = 0.88;
    const MULTIKILL_DURATION_OUT = 0.42;
    const BOMB_SHAKE_AMPLITUDE = 2.2;
    const BOMB_SHAKE_FREQUENCY = 18;
    const BOMB_EXPLOSION_DURATION = 0.28;
    const BOMB_FLASH_DURATION = 0.12;
    const DAMAGE_TEXT_DURATION = 0.5;
    const DAMAGE_TEXT_RISE = 42;
    const DAMAGE_TEXT_FONT_SCALE = 1;
    const FIRST_BOUNCE_UPWARD_SPEED_CAP_FACTOR = 0.5;
    const NEXT_BOUNCE_UPWARD_SPEED_CAP_FACTOR = 0.48;
    const BOUNCE_SPEED_GAIN_PER_HIT = 0.02;
    const BOUNCE_SPEED_GAIN_MAX = 0.2;
    const EGG_FINAL_SPEED_MULTIPLIER = 1.6;
    const AIM_PREDICT_STEPS = 180;
    const AIM_PREDICT_DT = 1 / 120;
    /** 每预测步内细分，避免引线穿过老鼠 */
    const AIM_PREDICT_SUB_STEPS = 14;
    /** 绘制前抽稀：去掉过密折点，减少杂乱重叠 */
    const AIM_DRAW_MIN_POINT_DIST = 20;
    /** 首次碰到老鼠后，引线尾段（之后整段折线长）只保留该比例，避免画出大量后续反弹 */
    const AIM_PATH_TAIL_AFTER_FIRST_HIT = 1 / 3;
    const PHYSICS_PRESETS = {
      // 预设A: 街机爽感，速度更快、反弹更多
      A: {
        name: "A-街机爽感",
        eggInitialSpeed: 980,
        eggGravity: 1456,
        eggAirDrag: 0.08,
        eggWallBounceDamp: 0.95,
        eggTopBounceDamp: 0.95,
        eggMonsterBounceDamp: 0.98,
        eggHitDownBias: 0,
        eggPostBounceFallBoost: 0
      },
      // 预设B: 策略下坠，速度偏慢、回落更明显
      B: {
        name: "B-策略下坠",
        eggInitialSpeed: 780,
        eggGravity: 1850,
        eggAirDrag: 0.26,
        eggWallBounceDamp: 0.76,
        eggTopBounceDamp: 0.68,
        eggMonsterBounceDamp: 1.014,
        eggHitDownBias: 64,
        eggPostBounceFallBoost: 112
      }
    };
    const ACTIVE_PHYSICS_PRESET = "A";
    const physics = PHYSICS_PRESETS[ACTIVE_PHYSICS_PRESET];
    const DUCK_TEST_CONFIGS = {
      "雀喵": { name: "雀喵", color: "#7b6cff", skill: "分裂弹", skillType: "splitShot" },
      "豹喵": { name: "豹喵", color: "#4cc9f0", skill: "炸裂弹", skillType: "bombShot" },
      "狸花喵": { name: "狸花喵", color: "#9be15d", skill: "普通攻击", skillType: "normal" },
      "阿比喵": { name: "阿比喵", color: "#c9a0e8", skill: "连击追弹", skillType: "abiCombo" }
    };
    const DUCK_TOOLTIP_TEXT = {
      "雀喵": `主子弹伤害：${EGG_HIT_DAMAGE_MIN}~${EGG_HIT_DAMAGE_MAX}\n技能效果：连续命中3次后分裂2发子弹\n技能伤害：副子弹 ${SPLIT_EGG_HIT_DAMAGE_MIN}~${SPLIT_EGG_HIT_DAMAGE_MAX}`,
      "豹喵": `主子弹伤害：${BOMB_HIT_DAMAGE_MIN}~${BOMB_HIT_DAMAGE_MAX}\n技能效果：炸弹碰到怪物后短暂停留，产生范围爆炸\n技能伤害：范围伤害 ${BOMB_HIT_DAMAGE_MIN}~${BOMB_HIT_DAMAGE_MAX}`,
      "狸花喵": `主子弹伤害：${EGG_HIT_DAMAGE_MIN}~${EGG_HIT_DAMAGE_MAX}\n技能效果：普普通通的喵，无额外技能\n技能伤害：无`,
      "阿比喵": `主子弹伤害：${EGG_HIT_DAMAGE_MIN}~${EGG_HIT_DAMAGE_MAX}\n技能效果：单次连击数达到一定次数时，额外发射 1 发追踪弹\n技能伤害：追踪弹 ${EGG_HIT_DAMAGE_MIN}~${EGG_HIT_DAMAGE_MAX}（与主子弹相同）`
    };
    const duckAvatarImages = {
      "雀喵": new Image(),
      "豹喵": new Image(),
      "狸花喵": new Image(),
      "阿比喵": new Image()
    };
    const duckAvatarProcessed = {};
    /**
     * 仅 GitHub + 腾讯云：入口用 GitHub Pages 打开本页（如 https://用户名.github.io/仓库名/chinaindex/），
     * 大图放 COS；此处填 COS 根地址（勿末尾 /）。COS 桶 CORS 的 Origin 填你的 github.io 页面地址。
     * 若 HTML 与 assets 同域（整站 GitHub 或整站 COS）可改回 ""（相对路径）。
     */
    const ASSET_BASE = "https://mutang-1312158805.cos.ap-guangzhou.myqcloud.com";
    function assetUrl(relativePath) {
      const p = String(relativePath).replace(/^\/+/, "");
      if (!ASSET_BASE) return p;
      return `${ASSET_BASE.replace(/\/+$/, "")}/${p}`;
    }
    function setImgCrossOriginIfNeeded(img) {
      if (!img) return;
      if (ASSET_BASE) img.crossOrigin = "anonymous";
      else img.removeAttribute("crossOrigin");
    }
    const CAT_AVATAR_ASSET_VER = 4;
    function catAvatarSrc(filename) {
      return `${assetUrl(`assets/cats/avatars/${filename}`)}?v=${CAT_AVATAR_ASSET_VER}`;
    }

    const LOAD_TOTAL = 12;
    const loadReportedKeys = new Set();
    let gameBootstrapped = false;
    function updateLoadOverlayUI() {
      const n = loadReportedKeys.size;
      const pct = Math.min(100, Math.round((n / LOAD_TOTAL) * 100));

    function rand(min, max) {

    }

    function randInt(min, max) {

    function clamp(v, min, max) {

    function randomBounceForceScale() {

    function randomMonsterBounceScale() {

    function getBounceSpeedGainScale(bounceCount = 0) {
      const gain = Math.min(BOUNCE_SPEED_GAIN_MAX, Math.max(0, bounceCount) * BOUNCE_SPEED_GAIN_PER_HIT);
      return 1 + gain;
    }

    function applyBounceSpeedGrowth(egg) {
      egg.bounceCount = (egg.bounceCount || 0) + 1;
      const maxBounceCount = Math.floor(BOUNCE_SPEED_GAIN_MAX / BOUNCE_SPEED_GAIN_PER_HIT);
      if (egg.bounceCount > maxBounceCount) egg.bounceCount = maxBounceCount;
    }

    function applyUpwardBounceCap(vx, vy, bounceCount = 0) {
      if (vy >= 0) return vy;
      const capFactor = bounceCount <= 0
        ? FIRST_BOUNCE_UPWARD_SPEED_CAP_FACTOR
        : NEXT_BOUNCE_UPWARD_SPEED_CAP_FACTOR;
      // 仅做【上限截断】，不再每次都乘系数，避免反弹次数越多越被持续削弱
      const totalSpeed = Math.hypot(vx, vy) || Math.abs(vy);
      const upwardCap = totalSpeed * capFactor;
      if (-vy > upwardCap) {
        return -upwardCap;
      }
      return vy;
    }

    function normalize(x, y) {
      const d = Math.hypot(x, y) || 1;
      return { x: x / d, y: y / d };
    }

    function triggerHitShake(strength = HIT_SHAKE_STRENGTH, duration = HIT_SHAKE_DURATION) {
      state.shakeStrength = Math.min(HIT_SHAKE_MAX, Math.max(state.shakeStrength, strength));
      state.shakeTime = Math.max(state.shakeTime, duration);
    }

    function buildRowSpawnCols() {
      const count = randInt(1, MAX_MONSTERS_PER_ROW);
      const useDensePattern = count >= 2 && Math.random() < 0.55;

      // 紧密相连: 连续列段（例如 1,2,3）
      if (useDensePattern) {
        const start = randInt(0, MONSTER_COLS - count);
        return Array.from({ length: count }, (_, i) => start + i);
      }

      // 分散排布: 随机抽列（例如 0,2,5）
      const cols = Array.from({ length: MONSTER_COLS }, (_, i) => i);
      for (let i = cols.length - 1; i > 0; i -= 1) {
        const j = randInt(0, i);
        const t = cols[i];
        cols[i] = cols[j];
        cols[j] = t;
      }
      return cols.slice(0, count);
    }

    function getProgress() {
      const t = state.stageTotalMonsters > 0 ? state.stageMonstersDefeated / state.stageTotalMonsters : 0;
      return Math.min(100, Math.floor(t * 100));
    }

    function addStageMonsterDefeat(n = 1) {
      if (!state.stageTotalMonsters) return;
      state.stageMonstersDefeated = Math.min(
        state.stageTotalMonsters,
        state.stageMonstersDefeated + n
      );
    }

    function planStage() {
      const waves = [];
      for (let i = 0; i < ROUNDS_PER_STAGE; i += 1) {
        waves.push(randInt(MIN_MONSTERS_PER_STAGE, MAX_MONSTERS_PER_STAGE));
      }
      const nEvents = ROUNDS_PER_STAGE * STAGE_REINFORCE_PER_ROUND;
      const queue = [];
      let reinSum = 0;
      for (let e = 0; e < nEvents; e += 1) {
        const colsA = buildRowSpawnCols();
        const colsB = buildRowSpawnCols();
        queue.push({ colsA, colsB });
        reinSum += colsA.length + colsB.length;
      }
      state.stageWaveCounts = waves;
      state.stageReinforcementQueue = queue;
      state.stageTotalMonsters = waves.reduce((a, b) => a + b, 0) + 1 + reinSum;
      state.stageMonstersDefeated = 0;
      state.moveStepsForReinforce = 0;
      state.reinforceCountThisRound = 0;
      state.reinforceBombMobGrantedThisRound = false;
    }

    function buildSpawnSlotsPool() {
      const spawnSlots = [];
      for (let rowOffset = 0; rowOffset < MONSTER_SPAWN_ROW_COUNT; rowOffset += 1) {
        const row = MONSTER_START_ROW + rowOffset;
        const rowCols = buildRowSpawnCols();
        for (const col of rowCols) {
          spawnSlots.push({ col, row });
        }
      }
      for (let i = spawnSlots.length - 1; i > 0; i -= 1) {
        const j = randInt(0, i);
        const t = spawnSlots[i];
        spawnSlots[i] = spawnSlots[j];
        spawnSlots[j] = t;
      }
      return spawnSlots;
    }

    function spawnWaveForStageRound(stageRound) {
      state.reinforceCountThisRound = 0;
      state.reinforceBombMobGrantedThisRound = false;
      const waveMinionCount = state.stageWaveCounts[stageRound - 1];
      const spawnSlots = buildSpawnSlotsPool();
      const list = [];
      const needBoss = stageRound === ROUNDS_PER_STAGE;
      const targetSize = needBoss ? 1 + waveMinionCount : waveMinionCount;

      if (needBoss) {
        list.push(
          makeMonster(2.5, MONSTER_START_ROW, randInt(MONSTER_HP_BOSS_MIN, MONSTER_HP_BOSS_MAX), "boss")
        );
        for (let i = spawnSlots.length - 1; i >= 0; i -= 1) {
          const slot = spawnSlots[i];
          if (slot.row === MONSTER_START_ROW && (slot.col === 2 || slot.col === 3)) {
            spawnSlots.splice(i, 1);
          }
        }
      }

      while (list.length < targetSize && spawnSlots.length > 0) {
        const slot = spawnSlots.pop();
        list.push(makeMonster(slot.col, slot.row, randInt(MONSTER_HP_MIN, MONSTER_HP_MAX)));
      }
      const nonBossIdx = [];
      for (let i = 0; i < list.length; i += 1) {
        if (list[i].type !== "boss") nonBossIdx.push(i);
      }
      if (nonBossIdx.length > 0) {
        const ri = nonBossIdx[randInt(0, nonBossIdx.length - 1)];
        const replaced = list[ri];
        list[ri] = makeMonster(replaced.col, replaced.row, 1, "bombMob");
      }
      for (const m of list) {
        m.reinforceSpawnAge = 0;
      }
      state.monsters.push(...list);
    }

    function spawnReinforcementFromQueue() {
      if (!state.stageReinforcementQueue || state.stageReinforcementQueue.length === 0) return;
      const ev = state.stageReinforcementQueue.shift();
      const { colsA, colsB } = ev;
      const r1 = Math.min(MONSTER_REINFORCE_ROW_GREEN, MONSTER_ROW_MAX);
      let r2 = Math.min(MONSTER_REINFORCE_ROW_BELOW_GREEN, MONSTER_ROW_MAX);
      if (r1 > MONSTER_ROW_MAX) return;
      if (r2 <= r1) r2 = Math.min(r1 + 1, MONSTER_ROW_MAX);
      const batch = [];
      for (const col of colsA) {
        batch.push(makeMonster(col, r1, randInt(MONSTER_HP_MIN, MONSTER_HP_MAX)));
      }
      for (const col of colsB) {
        batch.push(makeMonster(col, r2, randInt(MONSTER_HP_MIN, MONSTER_HP_MAX)));
      }
      if (
        batch.length > 0 &&
        !state.reinforceBombMobGrantedThisRound &&
        Math.random() < REINFORCE_BOMB_MOB_CHANCE
      ) {
        const ri = randInt(0, batch.length - 1);
        const b = batch[ri];
        batch[ri] = makeMonster(b.col, b.row, 1, "bombMob");
        state.reinforceBombMobGrantedThisRound = true;
      }
      for (const mon of batch) {
        mon.reinforceSpawnAge = 0;
        state.monsters.push(mon);
      }
    }

    function spawnEgg({
      x, y, vx, vy, ownerDuckName, canSplit, canBomb = false,
      damageMin = EGG_HIT_DAMAGE_MIN, damageMax = EGG_HIT_DAMAGE_MAX,

    function spawnSplitEggFrom(parentEgg) {
      for (const sign of [-1, 1]) {
        const angle = (SPLIT_BULLET_ANGLE_DEG * sign * Math.PI) / 180;
        const cos = Math.cos(angle);
        const sin = Math.sin(angle);
        const rvx = parentEgg.vx * cos - parentEgg.vy * sin;
        const rvy = parentEgg.vx * sin + parentEgg.vy * cos;
        const speedScale = SPLIT_BULLET_SPEED_FACTOR * rand(0.95, 1.05);
        spawnEgg({
          x: parentEgg.x,
          y: parentEgg.y,
          vx: rvx * speedScale,
          vy: rvy * speedScale,
          ownerDuckName: parentEgg.ownerDuckName,
          canSplit: false,
          canBomb: false,
          damageMin: SPLIT_EGG_HIT_DAMAGE_MIN,
          damageMax: SPLIT_EGG_HIT_DAMAGE_MAX,
          volleyId: parentEgg.volleyId
        });
        const child = state.eggs[state.eggs.length - 1];
        if (child) {
          child.bounceCount = parentEgg.bounceCount || 0;
        }
        volleyAddProjectile(parentEgg.volleyId);
      }
    }

    function spawnBomb({ x, y, ownerDuckName, vx = 0, vy = 0, isFlying = false, volleyId }) {
      state.bombs.push({
        x,
        y,
        vx,
        vy,
        isFlying,
        armed: !isFlying,
        radius: BOMB_RADIUS,
        timer: BOMB_TIMER_SECONDS,

    function maybeSpawnBombFromEgg(egg) {
      if (!egg.canBomb) return;
      const nextTriggerIdx = egg.bombTriggerCount || 0;
      if (nextTriggerIdx >= BOMB_TRIGGER_HITS.length) return;
      if (egg.hitMonsterCount >= BOMB_TRIGGER_HITS[nextTriggerIdx]) {
        spawnBomb({ x: egg.x, y: egg.y, ownerDuckName: egg.ownerDuckName, volleyId: egg.volleyId });
        volleyAddProjectile(egg.volleyId);
        egg.bombTriggerCount = nextTriggerIdx + 1;
      }
    }
