    function maybeSpawnBlueFireballFromKill(egg) {
      if (!egg || egg.blueFireball) return;
      if (egg.ownerCatName !== "蓝喵") return;
      if (!state.cats.some((d) => d.name === "蓝喵" && d.skillType === "blueKill")) return;
      queueBlueFireballSpawnsFromKill(egg.volleyId);
    }

    function queueBlueFireballSpawnsFromKill(volleyId) {
      const idx = state.cats.findIndex((d) => d.name === "蓝喵" && d.skillType === "blueKill");
      if (idx < 0) return;
      const anchor = getCatAnchor(idx);
      const spawnX = anchor.x;
      const spawnY = anchor.y + ABI_HOMING_SPAWN_BODY_OFFSET_Y;
      const targets = pickBlueFireballTargets(spawnX, spawnY, BLUE_KILL_FIREBALL_COUNT);
      if (!targets.length) return;
      targets.forEach((target, i) => {
        state.blueFireballSpawnQueue.push({
          volleyId,
          tRemain: i * BLUE_FIREBALL_SPAWN_STAGGER_SEC,
          targetId: target.id
        });
      });
    }

    function updateBlueFireballSpawnQueue(dt) {
      const q = state.blueFireballSpawnQueue;
      if (!q.length) return;
      const next = [];
      for (const item of q) {
        item.tRemain -= dt;
        if (item.tRemain <= 0) {
          spawnBlueFireballEgg(item.volleyId, item.targetId);
        } else {
          next.push(item);
        }
      }
      state.blueFireballSpawnQueue = next;
    }

    function spawnBlueFireballEgg(volleyId, preferredTargetId) {
      const idx = state.cats.findIndex((d) => d.name === "蓝喵" && d.skillType === "blueKill");
      if (idx < 0) return;
      const anchor = getCatAnchor(idx);
      const spawnX = anchor.x;
      const spawnY = anchor.y + ABI_HOMING_SPAWN_BODY_OFFSET_Y;
      let target =
        preferredTargetId != null
          ? state.monsters.find((m) => m.id === preferredTargetId && m.hp > 0)
          : null;
      if (!target) target = pickNearestMonsterFrom(spawnX, spawnY);
      if (!target) return;
      const dx = target.x - spawnX;
      const dy = target.y - spawnY;
      const dist = Math.hypot(dx, dy) || 1;
      const s = physics.eggInitialSpeed;
      const r = EGG_RADIUS * 1.35;
      state.eggs.push({
        x: spawnX,
        y: spawnY,
        vx: (dx / dist) * s,
        vy: (dy / dist) * s,
        abiArcP0x: spawnX,
        abiArcP0y: spawnY,
        abiArcSide: Math.random() < 0.5 ? -1 : 1,
        abiArcLiftUp: rand(ABI_HOMING_ARC_LIFT_UP_MIN, ABI_HOMING_ARC_LIFT_UP_MAX),
        abiArcLateral1: rand(ABI_HOMING_ARC_LATERAL1_MIN, ABI_HOMING_ARC_LATERAL1_MAX),
        abiArcLiftAboveTarget: rand(ABI_HOMING_ARC_ABOVE_TARGET_MIN, ABI_HOMING_ARC_ABOVE_TARGET_MAX),
        abiArcLateral2: rand(ABI_HOMING_ARC_LATERAL2_MIN, ABI_HOMING_ARC_LATERAL2_MAX),
        abiArcT: 0,
        abiArcDirect: false,
        radius: r,
        hitMonsterCount: 0,
        hitCooldown: 0,
        canSplit: false,
        canBomb: false,
        bombTriggerCount: 0,
        hasSplit: false,
        ownerCatName: "蓝喵",
        bounceCount: 0,
        damageMin: BLUE_FIREBALL_HIT_DAMAGE_MIN,
        damageMax: BLUE_FIREBALL_HIT_DAMAGE_MAX,
        homingTargetId: target.id,
        blueFireball: true,
        bulletSpriteKey: "blueFire",
        volleyId,
        canLihuaLaser: false,
        bulletDrawAngle: Math.atan2(dy, dx),
        bulletTrail: []
      });
      volleyAddProjectile(volleyId);
    }

    function maybeSpawnAbiHomingEgg() {
      const c = state.combo.count;
      if (c <= 0 || c % 3 !== 0) return;
      if (!state.cats.some((d) => d.name === "阿比喵" && d.skillType === "abiCombo")) return;
      if (!state.monsters.length) return;
      spawnAbiHomingEgg();
    }

    function addComboHit() {
      if (!state.combo.active) return;
      state.combo.count += 1;
      state.combo.holding = false;
      state.combo.holdTimer = 0;
      state.combo.popTimer = COMBO_POP_DURATION;
      state.hudFx.flashTimer = HUD_FOCUS_FLASH_DURATION;
      maybeSpawnAbiHomingEgg();
    }

    function updateCombo(dt) {
      if (!state.combo.active) return;
      const hasProjectiles =
        state.eggs.length > 0 || state.bombs.length > 0 || state.laserBeams.length > 0;
      if (hasProjectiles) {
        state.combo.holding = false;
        state.combo.holdTimer = 0;
        state.combo.popTimer = Math.max(0, state.combo.popTimer - dt);
        return;
      }
      if (!state.combo.holding) {
        state.combo.holding = true;
        state.combo.holdTimer = COMBO_HOLD_SECONDS_AFTER_CLEAR;
        return;
      }
      state.combo.holdTimer -= dt;
      state.combo.popTimer = Math.max(0, state.combo.popTimer - dt);
      if (state.combo.holdTimer <= 0) {
        state.combo.count = 0;
        state.combo.active = false;
        state.combo.holding = false;
        state.combo.holdTimer = 0;
        state.combo.ownerCatName = "";
        state.combo.popTimer = 0;
      }
    }

    function ensureVolleySlot(volleyId) {
      if (volleyId == null) return null;
      if (!state.volleyStats[volleyId]) {
        state.volleyStats[volleyId] = { kills: 0, refs: 0 };
      }
      return state.volleyStats[volleyId];
    }

    function volleyAddProjectile(volleyId) {
      const s = ensureVolleySlot(volleyId);
      if (!s) return;
      s.refs += 1;
    }

    function volleyAddKills(volleyId, n) {
      if (n <= 0) return;
      const s = ensureVolleySlot(volleyId);
      if (!s) return;
      s.kills += n;
    }

    function volleyRemoveProjectile(volleyId) {
      if (volleyId == null) return;
      const s = state.volleyStats[volleyId];
      if (!s) return;
      s.refs -= 1;
      if (s.refs <= 0) {
        const k = s.kills;
        delete state.volleyStats[volleyId];
        maybeShowMultiKillBanner(k);
      }
    }

    function triggerMultiKillBanner(n) {
      if (n < 2) return;
      state.multiKill.active = true;
      state.multiKill.n = n;
      state.multiKill.t = 0;
    }

    function maybeShowMultiKillBanner(totalKills) {
      triggerMultiKillBanner(totalKills || 0);
    }

    function easeOutBackMultikill(u) {
      const c1 = 1.70158;
      const c3 = c1 + 1;
      return 1 + c3 * (u - 1) ** 3 + c1 * (u - 1) ** 2;
    }

    function sampleMultiKillAnim(t) {
      const T0 = MULTIKILL_DURATION_IN;
      const T1 = MULTIKILL_DURATION_HOLD;
      const T2 = MULTIKILL_DURATION_OUT;
      const total = T0 + T1 + T2;
      if (t >= total) return { alpha: 0, scale: 1, dy: 0, rot: 0, offsetX: 0 };
      if (t < T0) {
        const u = clamp(t / T0, 0, 1);
        const alpha = clamp(u * 3.2, 0, 1);
        const span = MULTIKILL_SCALE_NEAR - MULTIKILL_SCALE_SLAM;
        let scale;
        if (u < 0.5) {
          const p = u / 0.5;
          const e = 1 - (1 - p) ** 3;
          scale = MULTIKILL_SCALE_NEAR - span * e;
        } else {
          const p = (u - 0.5) / 0.5;
          const back = easeOutBackMultikill(p);
          scale = MULTIKILL_SCALE_SLAM + (1 - MULTIKILL_SCALE_SLAM) * back;
        }
        return { alpha, scale, dy: 0, rot: 0, offsetX: 0 };
      }
      if (t < T0 + T1) {
        return { alpha: 1, scale: 1, dy: 0, rot: 0, offsetX: 0 };
      }
      const u = clamp((t - T0 - T1) / T2, 0, 1);
      const outEase = u * u;
      return {
        alpha: 1 - outEase,
        scale: 1,
        dy: 0,
        rot: 0,
        offsetX: 0
      };
    }

    function updateMultiKill(dt) {
      if (!state.multiKill.active) return;
      state.multiKill.t += dt;
      const total = MULTIKILL_DURATION_IN + MULTIKILL_DURATION_HOLD + MULTIKILL_DURATION_OUT;
      if (state.multiKill.t >= total) {
        state.multiKill.active = false;
        state.multiKill.t = 0;
      }
    }

    /** 出手条水平位移：自左入屏 → 居中停 → 向右离屏 */
    function sampleTurnAnnounceSlide(t) {
      const T0 = TURN_ANNOUNCE_DURATION_IN;
      const T1 = TURN_ANNOUNCE_DURATION_HOLD;
      const T2 = TURN_ANNOUNCE_DURATION_OUT;
      const total = T0 + T1 + T2;
      if (t >= total) return { offsetX: 0, alpha: 0 };
      const amp = W * 0.62;
      if (t < T0) {
        const u = clamp(t / T0, 0, 1);
        const ease = 1 - (1 - u) ** 3;
        return { offsetX: -amp + amp * ease, alpha: 1 };
      }
      if (t < T0 + T1) {
        return { offsetX: 0, alpha: 1 };
      }
      const u = clamp((t - T0 - T1) / T2, 0, 1);
      const ease = u * u * u;
      return { offsetX: amp * ease, alpha: 1 };
    }

    function updateTurnAnnounce(dt) {
      if (state.turnAnnounce.pending && !state.turnAnnounce.active) {
        if (state.turnAnnounce.staggerRemain > 0) {
          state.turnAnnounce.staggerRemain -= dt;
          if (state.turnAnnounce.staggerRemain < 0) state.turnAnnounce.staggerRemain = 0;
        }
        if (state.turnAnnounce.staggerRemain <= 0) tryStartTurnAnnounce();
      }
      if (!state.turnAnnounce.active) return;
      state.turnAnnounce.t += dt;
      const total =
        TURN_ANNOUNCE_DURATION_IN + TURN_ANNOUNCE_DURATION_HOLD + TURN_ANNOUNCE_DURATION_OUT;
      if (state.turnAnnounce.t >= total) {
        state.turnAnnounce.active = false;
        state.turnAnnounce.t = 0;
        state.turnAnnounce.pending = false;
      }
    }

    function updateHudFx(dt) {
      state.hudFx.time += dt;
      state.hudFx.flashTimer = Math.max(0, state.hudFx.flashTimer - dt);
      const shooterIdx = state.cats.length > 0 ? state.shooterCursor % state.cats.length : -1;
      state.hudFx.activeShooterIdx = shooterIdx;
    }

    /** 与真实弹球一致，用于瞄准引线（无随机炸弹/分裂副作用） */
    function simulateAimReflectOnMonster(egg, m, bounceMult = 1) {
      const incomingSpeed = Math.hypot(egg.vx, egg.vy) || 1;
      const isFollowUpHit = (egg.hitMonsterCount || 0) > 0;
      const nx = egg.x - m.x;
      const ny = egg.y - m.y;
      const nd = Math.hypot(nx, ny) || 1;
      let ux = nx / nd;
      let uy = ny / nd;
      if (Math.abs(ux) + Math.abs(uy) < 0.0001) {
        const fallbackDir = normalize(egg.vx || 1, egg.vy || 1);
        ux = fallbackDir.x;
        uy = fallbackDir.y;
      }
      const dot = egg.vx * ux + egg.vy * uy;
      const bounceScale = MONSTER_BOUNCE_RANDOM_MIN * bounceMult;
      egg.vx -= 2 * dot * ux;
      egg.vy -= 2 * dot * uy;
      egg.vx *= physics.eggMonsterBounceDamp * bounceScale;
      egg.vy = egg.vy * physics.eggMonsterBounceDamp * bounceScale + physics.eggHitDownBias;
      if (isFollowUpHit) {
        egg.vx *= FOLLOWUP_MONSTER_REBOUND_BOOST;
        egg.vy *= FOLLOWUP_MONSTER_REBOUND_BOOST;
      }

      const minOutwardSpeed = MONSTER_MIN_OUTWARD_REBOUND_SPEED * bounceScale;
      const outwardSpeed = egg.vx * ux + egg.vy * uy;
      if (outwardSpeed < minOutwardSpeed) {
        const push = minOutwardSpeed - outwardSpeed;
        egg.vx += ux * push;
        egg.vy += uy * push;
      }

      const reboundSpeed = Math.hypot(egg.vx, egg.vy) || 1;
      const minReboundSpeed = Math.max(
        MONSTER_MIN_TOTAL_REBOUND_SPEED,
        MONSTER_MIN_REBOUND_SPEED,
        incomingSpeed * MONSTER_REBOUND_KEEP_RATIO,
        isFollowUpHit ? FOLLOWUP_MONSTER_MIN_REBOUND_SPEED : 0
      );
      if (reboundSpeed < minReboundSpeed) {
        const scale = minReboundSpeed / reboundSpeed;
        egg.vx *= scale;
        egg.vy *= scale;
      }

      egg.vy = applyUpwardBounceCap(egg.vx, egg.vy, egg.bounceCount || 0);
      const minUpwardSpeed = isFollowUpHit
        ? FOLLOWUP_MONSTER_MIN_UPWARD_REBOUND_SPEED
        : MONSTER_MIN_UPWARD_REBOUND_SPEED;
      if (egg.vy > -minUpwardSpeed) {
        egg.vy = -minUpwardSpeed;
      }

      const targetDist = egg.radius + m.radius + 1.2;
      egg.x = m.x + ux * targetDist;
      egg.y = m.y + uy * targetDist;
      applyBounceSpeedGrowth(egg);
      egg.hitMonsterCount = (egg.hitMonsterCount || 0) + 1;
    }

    function truncateAimPathTailAfterFirstMonster(points, firstHitIdx, fraction) {
      if (firstHitIdx < 0 || firstHitIdx >= points.length - 1 || fraction >= 0.999) return points;
      let tailLen = 0;
      for (let i = firstHitIdx; i < points.length - 1; i += 1) {
        const dx = points[i + 1].x - points[i].x;
        const dy = points[i + 1].y - points[i].y;
        tailLen += Math.hypot(dx, dy);
      }
      const maxTail = tailLen * fraction;
      if (maxTail <= 0.5) return points.slice(0, firstHitIdx + 1);
      const out = points.slice(0, firstHitIdx + 1);
      let acc = 0;
      for (let i = firstHitIdx; i < points.length - 1; i += 1) {
        const dx = points[i + 1].x - points[i].x;
        const dy = points[i + 1].y - points[i].y;
        const segLen = Math.hypot(dx, dy);
        if (segLen < 1e-6) continue;
        if (acc + segLen <= maxTail + 1e-4) {
          out.push(points[i + 1]);
          acc += segLen;
        } else {
          const need = maxTail - acc;
          const t = Math.max(0, Math.min(1, need / segLen));
          out.push({
            x: points[i].x + t * dx,
            y: points[i].y + t * dy
          });
          break;
        }
      }
      return out;
    }

    function buildAimPath(dir, origin, opts = {}) {
      const points = [{ x: origin.x, y: origin.y }];
      let firstMonsterHitPointIndex = -1;
      const radius = opts.radius != null ? opts.radius : EGG_RADIUS;
      const aimEgg = {
        x: origin.x,
        y: origin.y,
        vx: dir.x * physics.eggInitialSpeed,
        vy: dir.y * physics.eggInitialSpeed,
        radius,
        bounceCount: 0,
        hitMonsterCount: 0
      };
      const subDt = AIM_PREDICT_DT / AIM_PREDICT_SUB_STEPS;

      for (let i = 0; i < AIM_PREDICT_STEPS; i += 1) {
        let abortPath = false;
        for (let s = 0; s < AIM_PREDICT_SUB_STEPS; s += 1) {
          const dragFactor = Math.exp(-physics.eggAirDrag * subDt);
          aimEgg.vx *= dragFactor;
          aimEgg.vy = aimEgg.vy * dragFactor + physics.eggGravity * subDt;
          const moveScale = EGG_FINAL_SPEED_MULTIPLIER * getBounceSpeedGainScale(aimEgg.bounceCount);
          aimEgg.x += aimEgg.vx * subDt * moveScale;
          aimEgg.y += aimEgg.vy * subDt * moveScale;

          if (aimEgg.x <= radius) {
            aimEgg.x = radius;
            aimEgg.vx = Math.abs(aimEgg.vx) * physics.eggWallBounceDamp;
            aimEgg.vy *= 0.985;
            aimEgg.vy = applyUpwardBounceCap(aimEgg.vx, aimEgg.vy, aimEgg.bounceCount);
            aimEgg.bounceCount += 1;
          } else if (aimEgg.x >= W - radius) {
            aimEgg.x = W - radius;
            aimEgg.vx = -Math.abs(aimEgg.vx) * physics.eggWallBounceDamp;
            aimEgg.vy *= 0.985;
            aimEgg.vy = applyUpwardBounceCap(aimEgg.vx, aimEgg.vy, aimEgg.bounceCount);
            aimEgg.bounceCount += 1;
          }

          if (aimEgg.y <= BATTLE_TOP + radius && aimEgg.vy < 0) {
            aimEgg.y = BATTLE_TOP + radius;
            aimEgg.vy = Math.abs(aimEgg.vy) * physics.eggTopBounceDamp;
            aimEgg.bounceCount += 1;
          }

          let resolvePass = 0;
          while (resolvePass < 4) {
            let hitAny = false;
            for (const m of state.monsters) {
              const dx = aimEgg.x - m.x;
              const dy = aimEgg.y - m.y;
              const rr = radius + m.radius;
              if (dx * dx + dy * dy <= rr * rr) {
                if (m.type === "bombMob") {
                  const nd = Math.hypot(dx, dy) || 1;
                  const ux = dx / nd;
                  const uy = dy / nd;
                  const targetDist = radius + m.radius + 1.2;
                  aimEgg.x = m.x + ux * targetDist;
                  aimEgg.y = m.y + uy * targetDist;
                  points.push({ x: aimEgg.x, y: aimEgg.y });
                  if (firstMonsterHitPointIndex < 0) {
                    firstMonsterHitPointIndex = points.length - 1;
                  }
                  abortPath = true;
                  hitAny = true;
                  break;
                }
                /** 瞄准预览不乘肉鸽弹射倍率：倍率会使同一步数内怪物反弹暴增，首击后即使只保留 1/3 尾段仍像「满屏乱线」；实弹仍用 egg.rogueBounceMult */
                simulateAimReflectOnMonster(aimEgg, m, 1);
                points.push({ x: aimEgg.x, y: aimEgg.y });
                if (firstMonsterHitPointIndex < 0) {
                  firstMonsterHitPointIndex = points.length - 1;
                }
                hitAny = true;
                break;
              }
            }
            if (abortPath) break;
            if (!hitAny) break;
            resolvePass += 1;
          }
          if (abortPath) break;
        }
        if (abortPath) break;

        if (aimEgg.y >= BATTLE_BOTTOM - radius) {
          points.push({ x: aimEgg.x, y: aimEgg.y });
          break;
        }
        if (i % 2 === 0) {
          points.push({ x: aimEgg.x, y: aimEgg.y });
        }
      }

      const tail = { x: aimEgg.x, y: aimEgg.y };
      const lastPt = points[points.length - 1];
      if (lastPt && (Math.hypot(tail.x - lastPt.x, tail.y - lastPt.y) > 4)) {
        points.push(tail);
      }

      /** 体积预览倍率越大，同一步数内碰撞越多，尾段略收紧使引线可读 */
      const radiusScale = radius / EGG_RADIUS;
      const tailFrac =
        AIM_PATH_TAIL_AFTER_FIRST_HIT / Math.max(1, Math.cbrt(radiusScale));

      return truncateAimPathTailAfterFirstMonster(
        points,
        firstMonsterHitPointIndex,
        tailFrac
      );
    }

    /** 肉鸽「合击」：从非主角的猫中再发动几只；1只20%、2只50%、3只30% */
    function rollJointExtraCatCount() {
      const r = Math.random();
      if (r < 0.2) return 1;
      if (r < 0.7) return 2;
      return 3;
    }

    function spawnJointShotFromCat(shooterCat, origin, dir, volleyId) {
      const spd = physics.eggInitialSpeed;
      if (shooterCat.skillType === "bombShot") {
        spawnBomb({
          x: origin.x,
          y: origin.y,
          vx: dir.x * spd,
          vy: dir.y * spd,
          ownerCatName: shooterCat.name,
          isFlying: true,
          volleyId,
          radius: BOMB_RADIUS,
          explosionDamageMult: 1,
          wallBounceMult: 1
        });
        volleyAddProjectile(volleyId);
        return;
      }
      spawnEgg({
        x: origin.x,
        y: origin.y,
        vx: dir.x * spd,
        vy: dir.y * spd,
        ownerCatName: shooterCat.name,
        canSplit: shooterCat.skillType === "splitShot",
        canBomb: shooterCat.skillType === "bombShot",
        canLihuaLaser: shooterCat.skillType === "lihuaLaser",
        volleyId,
        damageMin: EGG_HIT_DAMAGE_MIN,
        damageMax: EGG_HIT_DAMAGE_MAX,
        radius: EGG_RADIUS,
        rogueBounceMult: 1,
        isMainBullet: true
      });
      volleyAddProjectile(volleyId);
    }

    function emitRogueJointFollowupShots(dir, volleyId, shooterIdx) {
      const want = rollJointExtraCatCount();
      const others = [];
      for (let i = 0; i < state.cats.length; i += 1) {
        if (i !== shooterIdx) others.push(i);
      }
      for (let i = others.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        const t = others[i];
        others[i] = others[j];
        others[j] = t;
      }
      const n = Math.min(want, others.length);
      for (let k = 0; k < n; k += 1) {
        const idx = others[k];
        spawnJointShotFromCat(state.cats[idx], getCatAnchor(idx), dir, volleyId);
      }
    }

    function fireEgg(dir) {
      const shooterCat = getCurrentShooterCat();
      if (!shooterCat || state.shotsLeft <= 0) return;
      const doJoint = state.rogue.combineNext > 0;
      const shooterIdx = state.shooterCursor % state.cats.length;
      gameAudio.playFire();
      startComboForShot(shooterCat.name);
      const volleyId = (state.volleyNextId += 1);
      state.comboVolleyId = volleyId;
      const origin = getCurrentShootOrigin();
      const rb = consumeRogueMainBuffs();
      if (shooterCat.skillType === "bombShot") {
        spawnBomb({
          x: origin.x,
          y: origin.y,
          vx: dir.x * physics.eggInitialSpeed,
          vy: dir.y * physics.eggInitialSpeed,
          ownerCatName: shooterCat.name,
          isFlying: true,
          volleyId,
          radius: BOMB_RADIUS * rb.sizeMult,
          explosionDamageMult: rb.damageMult,
          wallBounceMult: 1
        });
        volleyAddProjectile(volleyId);
        if (state.rogue.rainstormNext > 0) {
          state.rogue.rainstormNext -= 1;
          spawnRogueRainBullets(origin, dir, volleyId, shooterCat);
        }
        state.shotsLeft -= 1;
        if (doJoint) {
          state.rogue.combineNext = 0;
          emitRogueJointFollowupShots(dir, volleyId, shooterIdx);
        }
        return;
      }
      spawnEgg({
        x: origin.x,
        y: origin.y,
        vx: dir.x * physics.eggInitialSpeed,
        vy: dir.y * physics.eggInitialSpeed,
        ownerCatName: shooterCat.name,
        canSplit: shooterCat.skillType === "splitShot",
        canBomb: shooterCat.skillType === "bombShot",
        canLihuaLaser: shooterCat.skillType === "lihuaLaser",
        volleyId,
        damageMin: Math.round(EGG_HIT_DAMAGE_MIN * rb.damageMult),
        damageMax: Math.round(EGG_HIT_DAMAGE_MAX * rb.damageMult),
        radius: EGG_RADIUS * rb.sizeMult,
        rogueBounceMult: 1,
        isMainBullet: true
      });
      volleyAddProjectile(volleyId);
      if (state.rogue.rainstormNext > 0) {
        state.rogue.rainstormNext -= 1;
        spawnRogueRainBullets(origin, dir, volleyId, shooterCat);
      }
      state.shotsLeft -= 1;
      if (doJoint) {
        state.rogue.combineNext = 0;
        emitRogueJointFollowupShots(dir, volleyId, shooterIdx);
      }
    }

    function reflectBallOnMonster(egg, m) {
      const incomingSpeed = Math.hypot(egg.vx, egg.vy) || 1;
      const isFollowUpHit = (egg.hitMonsterCount || 0) > 0;
      const nx = egg.x - m.x;
      const ny = egg.y - m.y;
      const nd = Math.hypot(nx, ny) || 1;
      let ux = nx / nd;
      let uy = ny / nd;
      if (Math.abs(ux) + Math.abs(uy) < 0.0001) {
        const fallbackDir = normalize(egg.vx || 1, egg.vy || 1);
        ux = fallbackDir.x;
        uy = fallbackDir.y;
      }
      const dot = egg.vx * ux + egg.vy * uy;
      const rb = egg.isMainBullet ? (egg.rogueBounceMult || 1) : 1;
      const bounceScale = randomMonsterBounceScale() * rb;
      egg.vx -= 2 * dot * ux;
      egg.vy -= 2 * dot * uy;
      egg.vx *= physics.eggMonsterBounceDamp * bounceScale;
      egg.vy = egg.vy * physics.eggMonsterBounceDamp * bounceScale + physics.eggHitDownBias;
      if (isFollowUpHit) {
        egg.vx *= FOLLOWUP_MONSTER_REBOUND_BOOST;
        egg.vy *= FOLLOWUP_MONSTER_REBOUND_BOOST;
      }

      // 避免贴着怪物表面【滚动】不弹开：保证最小外向反弹速度
      const minOutwardSpeed = MONSTER_MIN_OUTWARD_REBOUND_SPEED * bounceScale;
      const outwardSpeed = egg.vx * ux + egg.vy * uy;
      if (outwardSpeed < minOutwardSpeed) {
        const push = minOutwardSpeed - outwardSpeed;
        egg.vx += ux * push;
        egg.vy += uy * push;
      }

      const reboundSpeed = Math.hypot(egg.vx, egg.vy) || 1;
      const minReboundSpeed = Math.max(
        MONSTER_MIN_TOTAL_REBOUND_SPEED,
        MONSTER_MIN_REBOUND_SPEED,
        incomingSpeed * MONSTER_REBOUND_KEEP_RATIO,
        isFollowUpHit ? FOLLOWUP_MONSTER_MIN_REBOUND_SPEED : 0
      );
      if (reboundSpeed < minReboundSpeed) {
        const scale = minReboundSpeed / reboundSpeed;
        egg.vx *= scale;
        egg.vy *= scale;
      }

      egg.vy = applyUpwardBounceCap(egg.vx, egg.vy, egg.bounceCount || 0);
      // 怪物碰撞专用底线：避免几乎不回弹而贴着怪物下滑
      const minUpwardSpeed = isFollowUpHit
        ? FOLLOWUP_MONSTER_MIN_UPWARD_REBOUND_SPEED
        : MONSTER_MIN_UPWARD_REBOUND_SPEED;
      if (egg.vy > -minUpwardSpeed) {
        egg.vy = -minUpwardSpeed;
      }

      const targetDist = egg.radius + m.radius + 1.2;
      egg.x = m.x + ux * targetDist;
      egg.y = m.y + uy * targetDist;
      applyBounceSpeedGrowth(egg);
      egg.hitMonsterCount = (egg.hitMonsterCount || 0) + 1;
      egg.hitCooldown = MONSTER_HIT_COOLDOWN;
      maybeSpawnBombFromEgg(egg);

      if (egg.canSplit && !egg.hasSplit && egg.hitMonsterCount >= SPLIT_TRIGGER_HITS) {
        egg.hasSplit = true;
        spawnSplitEggFrom(egg);
      }
    }

    function updateEggs(dt) {
      const alive = [];

      for (const egg of state.eggs) {
        let removed = false;

        if (egg.homingTargetId) {
          egg.hitCooldown = Math.max(0, (egg.hitCooldown || 0) - dt);
          let target = state.monsters.find((m) => m.id === egg.homingTargetId && m.hp > 0);
          if (!target) {
            target = pickHighestHpMonster();
            if (target) egg.homingTargetId = target.id;
            else removed = true;
          }
          if (!removed && target) {
            const prevX = egg.x;
            const prevY = egg.y;
            const moveScale = EGG_FINAL_SPEED_MULTIPLIER * getBounceSpeedGainScale(egg.bounceCount || 0);
            const sp = physics.eggInitialSpeed;
            const useArc =
              egg.abiArcP0x != null &&
              egg.abiArcP0y != null &&
              egg.abiArcLiftUp != null &&
              egg.abiArcLateral1 != null &&
              egg.abiArcLiftAboveTarget != null &&
              egg.abiArcLateral2 != null &&
              egg.abiArcSide != null &&
              !egg.abiArcDirect;

            if (useArc) {
              const p0x = egg.abiArcP0x;
              const p0y = egg.abiArcP0y;
              const p3x = target.x;
              const p3y = target.y;
              const side = egg.abiArcSide;
              const p1x = p0x + side * egg.abiArcLateral1;
              const p1y = p0y - egg.abiArcLiftUp;
              const p2x = p3x + side * egg.abiArcLateral2;
              const p2y = p3y - egg.abiArcLiftAboveTarget;

              /** 弧线段位移不由 vx*dt*moveScale 驱动，须把 t 推进除以 moveScale，与主子弹「初速×EGG_FINAL_SPEED_MULTIPLIER」一致 */
              egg.abiArcT = Math.min(1, egg.abiArcT + (dt * ABI_HOMING_ARC_T_PER_SEC) / moveScale);
              const tt = abiHomingEaseT(egg.abiArcT);
              const pos = abiHomingCubicPoint(p0x, p0y, p1x, p1y, p2x, p2y, p3x, p3y, tt);
              egg.x = pos.x;
              egg.y = pos.y;
              const tTan = Math.min(tt, 0.999);
              const tan = abiHomingCubicTangent(p0x, p0y, p1x, p1y, p2x, p2y, p3x, p3y, tTan);
              const tl = Math.hypot(tan.dx, tan.dy) || 1;
              egg.vx = (tan.dx / tl) * sp;
              egg.vy = (tan.dy / tl) * sp;
              if (egg.abiArcT >= 1) egg.abiArcDirect = true;
            } else {
              const tdx = target.x - egg.x;
              const tdy = target.y - egg.y;
              const tdist = Math.hypot(tdx, tdy) || 1;
              egg.vx = (tdx / tdist) * sp;
              egg.vy = (tdy / tdist) * sp;
              egg.x += egg.vx * dt * moveScale;
              egg.y += egg.vy * dt * moveScale;
            }
            egg.x = clamp(egg.x, egg.radius, W - egg.radius);
            /** 弧线段若仍用 BATTLE_TOP 为下限，上扬会被裁平，看不出「先飞高再下砸」 */
            const homingMinY =
              useArc && !egg.abiArcDirect ? egg.radius : BATTLE_TOP + egg.radius;
            egg.y = clamp(egg.y, homingMinY, H);

            const mdx = egg.x - prevX;
            const mdy = egg.y - prevY;
            if (mdx * mdx + mdy * mdy > 0.08) egg.bulletDrawAngle = Math.atan2(mdy, mdx);
            if (!egg.bulletTrail) egg.bulletTrail = [];
            egg.bulletTrail.push({ x: egg.x, y: egg.y });
            while (egg.bulletTrail.length > BULLET_TRAIL_MAX) egg.bulletTrail.shift();

            if (egg.hitCooldown <= 0) {
              for (const m of state.monsters) {
                const dx = egg.x - m.x;
                const dy = egg.y - m.y;
                const r = egg.radius + m.radius;
                if (dx * dx + dy * dy <= r * r) {
                  if (m.type === "bombMob") {
                    triggerHitShake();
                    addComboHit();
                    if (egg.canLihuaLaser) spawnLihuaHorizontalLaser(m.y, egg.volleyId, m.row);
                    applyBombExplosionDamageAt(m.x, m.y, egg);
                    removed = true;
                    break;
                  }
                  triggerHitShake();
                  const damage = randInt(egg.damageMin, egg.damageMax);
                  m.hp -= damage;
                  gameAudio.playHit();
                  applyMonsterHitShake(m);
                  spawnDamageText(m, damage);
                  addComboHit();
                  if (egg.canLihuaLaser) spawnLihuaHorizontalLaser(m.y, egg.volleyId, m.row);
                  if (m.hp <= 0) {
                    state.kills += 1;
                    volleyAddKills(egg.volleyId, 1);
                    addStageMonsterDefeat(1);
                    if (m.type === "chest") queueRogueChestReward();
                    maybeSpawnBlueFireballFromKill(egg);
                  }
                  if (egg.blueFireball) applyBombExplosionDamageAt(m.x, m.y, egg);
                  removed = true;
                  break;
                }
              }
            }
          }

          state.monsters = state.monsters.filter((m) => m.hp > 0);

          if (removed) volleyRemoveProjectile(egg.volleyId);
          if (!removed) alive.push(egg);
          continue;
        }

        const prevPhysX = egg.x;
        const prevPhysY = egg.y;
        const dragFactor = Math.exp(-physics.eggAirDrag * dt);
        egg.vx *= dragFactor;
        egg.vy = egg.vy * dragFactor + physics.eggGravity * dt;
        egg.hitCooldown = Math.max(0, (egg.hitCooldown || 0) - dt);
        const moveScale = EGG_FINAL_SPEED_MULTIPLIER * getBounceSpeedGainScale(egg.bounceCount || 0);

        egg.x += egg.vx * dt * moveScale;
        egg.y += egg.vy * dt * moveScale;

        if (egg.x <= egg.radius) {
          const bounceScale = randomBounceForceScale();
          egg.x = egg.radius;
          egg.vx = Math.abs(egg.vx) * physics.eggWallBounceDamp * bounceScale;
          egg.vy *= 0.985;
          egg.vy = applyUpwardBounceCap(egg.vx, egg.vy, egg.bounceCount || 0);
          applyBounceSpeedGrowth(egg);
        } else if (egg.x >= W - egg.radius) {
          const bounceScale = randomBounceForceScale();
          egg.x = W - egg.radius;
          egg.vx = -Math.abs(egg.vx) * physics.eggWallBounceDamp * bounceScale;
          egg.vy *= 0.985;
          egg.vy = applyUpwardBounceCap(egg.vx, egg.vy, egg.bounceCount || 0);
          applyBounceSpeedGrowth(egg);
        }

        if (egg.y <= BATTLE_TOP + egg.radius && egg.vy < 0) {
          const bounceScale = randomBounceForceScale();
          egg.y = BATTLE_TOP + egg.radius;
          egg.vy = Math.abs(egg.vy) * physics.eggTopBounceDamp * bounceScale;
          applyBounceSpeedGrowth(egg);
        }

        const pmx = egg.x - prevPhysX;
        const pmy = egg.y - prevPhysY;
        if (pmx * pmx + pmy * pmy > 0.08) egg.bulletDrawAngle = Math.atan2(pmy, pmx);
        if (!egg.bulletTrail) egg.bulletTrail = [];
        egg.bulletTrail.push({ x: egg.x, y: egg.y });
        while (egg.bulletTrail.length > BULLET_TRAIL_MAX) egg.bulletTrail.shift();

        removed = false;

        if (egg.hitCooldown <= 0) {
          for (const m of state.monsters) {
            const dx = egg.x - m.x;
            const dy = egg.y - m.y;
            const r = egg.radius + m.radius;
            if (dx * dx + dy * dy <= r * r) {
              if (m.type === "bombMob") {
                triggerHitShake();
                addComboHit();
                if (egg.canLihuaLaser) spawnLihuaHorizontalLaser(m.y, egg.volleyId, m.row);
                applyBombExplosionDamageAt(m.x, m.y, egg);
                removed = true;
                break;
              }
              reflectBallOnMonster(egg, m);
              triggerHitShake();
              const damage = randInt(egg.damageMin, egg.damageMax);
              m.hp -= damage;
              gameAudio.playHit();
              applyMonsterHitShake(m);
              spawnDamageText(m, damage);
              addComboHit();
              if (egg.canLihuaLaser) spawnLihuaHorizontalLaser(m.y, egg.volleyId, m.row);
              if (m.hp <= 0) {
                state.kills += 1;
                volleyAddKills(egg.volleyId, 1);
                addStageMonsterDefeat(1);
                if (m.type === "chest") queueRogueChestReward();
                maybeSpawnBlueFireballFromKill(egg);
              }
              // 一帧只处理一次怪物碰撞，避免连撞导致力度异常
              break;
            }
          }
        }

        state.monsters = state.monsters.filter((m) => m.hp > 0);

        const speedNow = Math.hypot(egg.vx, egg.vy);
        if (egg.y >= BATTLE_BOTTOM + egg.radius || (egg.y >= BATTLE_BOTTOM - 28 && speedNow < 120)) {
          removed = true;
        }

        if (removed) volleyRemoveProjectile(egg.volleyId);
        if (!removed) alive.push(egg);
      }

      state.eggs = alive;
    }

    /** 与豹喵炸弹引爆相同：震动、爆炸特效、范围伤害与击败统计 */
    function applyBombExplosionDamageAt(mx, my, killRecord) {
      gameAudio.playExplode();
      triggerHitShake(7, 0.08);
      const blastR =
        killRecord && killRecord.blastRadius != null && killRecord.blastRadius > 0
          ? killRecord.blastRadius
          : BOMB_BLAST_RADIUS;
      state.explosions.push({
        x: mx,
        y: my,
        radius: blastR,
        time: 0,
        duration: BOMB_EXPLOSION_DURATION
      });
      let explosionKills = 0;
      const dmgMult =
        killRecord && killRecord.explosionDamageMult != null ? killRecord.explosionDamageMult : 1;
      let dMin;
      let dMax;
      if (killRecord && killRecord.blueFireball) {
        dMin = Math.max(1, BLUE_FIREBALL_EXPLOSION_DAMAGE_MIN);
        dMax = Math.max(dMin, BLUE_FIREBALL_EXPLOSION_DAMAGE_MAX);
      } else {
        dMin = Math.max(1, Math.round(BOMB_HIT_DAMAGE_MIN * dmgMult));
        dMax = Math.max(dMin, Math.round(BOMB_HIT_DAMAGE_MAX * dmgMult));
      }
      for (const m of state.monsters) {
        const dx = mx - m.x;
        const dy = my - m.y;
        const rr = blastR + m.radius;
        if (dx * dx + dy * dy <= rr * rr) {
          const damage = randInt(dMin, dMax);
          m.hp -= damage;
          applyMonsterHitShake(m);
          spawnDamageText(m, damage);
          if (m.hp <= 0) {
            state.kills += 1;
            explosionKills += 1;
            addStageMonsterDefeat(1);
            if (m.type === "chest") queueRogueChestReward();
          }
        }
      }
      if (killRecord && killRecord.volleyId != null) {
        volleyAddKills(killRecord.volleyId, explosionKills);
      }
      state.monsters = state.monsters.filter((mm) => mm.hp > 0);
    }

    function updateBombs(dt) {
      const remain = [];
      for (const b of state.bombs) {
        b.age += dt;
        if (b.isFlying) {
          const prevBx = b.x;
          const prevBy = b.y;
          const dragFactor = Math.exp(-physics.eggAirDrag * dt);
          b.vx *= dragFactor;
          b.vy = b.vy * dragFactor + physics.eggGravity * dt;
          b.x += b.vx * dt * EGG_FINAL_SPEED_MULTIPLIER;
          b.y += b.vy * dt * EGG_FINAL_SPEED_MULTIPLIER;

          const bmx = b.x - prevBx;
          const bmy = b.y - prevBy;
          if (bmx * bmx + bmy * bmy > 0.08) b.bulletDrawAngle = Math.atan2(bmy, bmx);
          if (!b.bulletTrail) b.bulletTrail = [];
          b.bulletTrail.push({ x: b.x, y: b.y });
          while (b.bulletTrail.length > BULLET_TRAIL_MAX) b.bulletTrail.shift();

          const wb = b.wallBounceMult != null ? b.wallBounceMult : 1;
          if (b.x <= b.radius) {
            const bounceScale = randomBounceForceScale() * wb;
            b.x = b.radius;
            b.vx = Math.abs(b.vx) * physics.eggWallBounceDamp * bounceScale;
            b.vy *= 0.985;
          } else if (b.x >= W - b.radius) {
            const bounceScale = randomBounceForceScale() * wb;
            b.x = W - b.radius;
            b.vx = -Math.abs(b.vx) * physics.eggWallBounceDamp * bounceScale;
            b.vy *= 0.985;
          }

          if (b.y <= BATTLE_TOP + b.radius && b.vy < 0) {
            const bounceScale = randomBounceForceScale() * wb;
            b.y = BATTLE_TOP + b.radius;
            b.vy = Math.abs(b.vy) * physics.eggTopBounceDamp * bounceScale;
          }

          let stuck = false;
          for (const m of state.monsters) {
            const dx = b.x - m.x;
            const dy = b.y - m.y;
            const rr = b.radius + m.radius;
            if (dx * dx + dy * dy <= rr * rr) {
              const nd = Math.hypot(dx, dy) || 1;
              const ux = dx / nd;
              const uy = dy / nd;
              b.isFlying = false;
              b.armed = true;
              b.timer = BOMB_TIMER_SECONDS;
              // 吸附到怪物边缘，避免视觉上漂在怪物外侧
              b.x = m.x + ux * (m.radius + b.radius - 2);
              b.y = m.y + uy * (m.radius + b.radius - 2);
              b.vx = 0;
              b.vy = 0;
              b.bulletTrail = [];
              addComboHit();
              stuck = true;
              break;
            }
          }

          if (!stuck && b.y > BATTLE_BOTTOM + b.radius) {
            volleyRemoveProjectile(b.volleyId);
            continue;
          }
          if (b.isFlying) {
            remain.push(b);
            continue;
          }
        }

        if (!b.armed) {
          remain.push(b);
          continue;
        }

        b.timer -= dt;
        if (b.timer > 0) {
          remain.push(b);
          continue;
        }
        applyBombExplosionDamageAt(b.x, b.y, b);
        volleyRemoveProjectile(b.volleyId);
      }
      state.bombs = remain;
    }

    function updateExplosions(dt) {
      const active = [];
      for (const e of state.explosions) {
        e.time += dt;
        if (e.time < e.duration) active.push(e);
      }
      state.explosions = active;
    }

    function updateDamageTexts(dt) {
      const alive = [];
      for (const t of state.damageTexts) {
        t.age += dt;
        if (t.age < t.duration) alive.push(t);
      }
      state.damageTexts = alive;
    }

    function applyMonsterHitShake(m) {
      m.hitShakeTime = MONSTER_HIT_SHAKE_DURATION;
      m.hitShakePhase = rand(0, Math.PI * 2);
    }

    function updateMonsterHitShake(dt) {
      for (const m of state.monsters) {
        if (m.hitShakeTime > 0) {
          m.hitShakeTime = Math.max(0, m.hitShakeTime - dt);
        }
      }
    }

    function getMonsterHitShakeOffset(m) {
      const rem = m.hitShakeTime || 0;
      if (rem <= 0) return { x: 0, y: 0 };
      const elapsed = MONSTER_HIT_SHAKE_DURATION - rem;
      const decay = rem / MONSTER_HIT_SHAKE_DURATION;
      const ph = m.hitShakePhase || 0;
      const amp = MONSTER_HIT_SHAKE_PX * decay;
      return {
        x: Math.sin(elapsed * 50 + ph) * amp,
        y: Math.cos(elapsed * 43 + ph * 1.15) * amp * 0.55
      };
    }

    function getMonsterHitScale(m) {
      const rem = m.hitShakeTime || 0;
      if (rem <= 0) return 1;
      const elapsed = MONSTER_HIT_SHAKE_DURATION - rem;
      const t = elapsed / MONSTER_HIT_SHAKE_DURATION;
      return 1 + MONSTER_HIT_SCALE_PULSE * Math.sin(Math.PI * t);
    }

    function getReinforceSpawnPresent(m) {
      if (m.reinforceSpawnAge == null) {
        return { scale: 1, alpha: 1, dy: 0 };
      }
      const age = Math.min(m.reinforceSpawnAge, REINFORCE_SPAWN_DURATION);
      const t = age / REINFORCE_SPAWN_DURATION;
      const e = 1 - (1 - t) ** 3;
      return {
        scale: 0.5 + 0.5 * e,
        alpha: Math.max(0.08, 0.18 + 0.82 * e),
        dy: (1 - e) * REINFORCE_SPAWN_SLIDE_PX
      };
    }

    function updateMonsterReinforceSpawn(dt) {
      for (const m of state.monsters) {
        if (m.reinforceSpawnAge == null) continue;
        m.reinforceSpawnAge += dt;
        if (m.reinforceSpawnAge >= REINFORCE_SPAWN_DURATION) {
          m.reinforceSpawnAge = null;
        }
      }
    }

    function getMonsterHitFlashAlpha(m) {
      const rem = m.hitShakeTime || 0;
      if (rem <= 0) return 0;
      const fade = rem / MONSTER_HIT_SHAKE_DURATION;
      return MONSTER_HIT_FLASH_ALPHA_MAX * fade ** 0.38;
    }

    function updateMonsterRowMove(dt) {
      const scaleAmp = MONSTER_ROW_MOVE_SCALE_PEAK - 1;
      for (const m of state.monsters) {
        if (!m.rowMoveAnim) continue;
        const a = m.rowMoveAnim;
        a.t += dt / a.duration;
        const t = Math.min(1, a.t);
        const tEase = 1 - (1 - t) ** 3;
        const base = a.fromY + (a.toY - a.fromY) * tEase;
        const jump = Math.sin(Math.PI * t) * -MONSTER_ROW_JUMP_PX;
        m.y = base + jump;
        m.rowMoveDisplayScale = 1 + scaleAmp * Math.sin(Math.PI * t);
        if (t >= 1) {
          m.y = a.toY;
          m.rowMoveAnim = null;
          m.rowMoveDisplayScale = 1;
        }
      }
    }

    function spawnEnemyBulletsFromShooterMobs() {
      for (const m of state.monsters) {
        if (m.hp <= 0) continue;
        if (m.type !== "shooterMob") continue;
        state.enemyBullets.push({
          x: m.x,
          y: m.y - m.radius,
          vy: -ENEMY_BULLET_SPEED,
          radius: ENEMY_BULLET_RADIUS
        });
      }
    }

    function updateEnemyBullets(dt) {
      const left = HP_BAR_HIT_X;
      const right = HP_BAR_HIT_X + HP_BAR_HIT_W;
      const top = HP_BAR_TOP;
      const bottom = HP_BAR_BOTTOM;
      const alive = [];
      for (const b of state.enemyBullets) {
        b.y += b.vy * dt;
        const cx = b.x;
        const r = b.radius;
        const hit =
          cx + r >= left &&
          cx - r <= right &&
          b.y + r >= top &&
          b.y - r <= bottom;
        if (hit) {
          state.playerHp = clamp(state.playerHp - ENEMY_BULLET_DAMAGE, 0, state.playerMaxHp);
          gameAudio.playHurt();
          triggerHitShake(7, 0.1);
          continue;
        }
        if (b.y + r < -40) continue;
        alive.push(b);
      }
      state.enemyBullets = alive;
    }

    function moveMonstersForward() {
      spawnEnemyBulletsFromShooterMobs();
      let lineHits = 0;
      for (const m of state.monsters) {
        const fromY = m.y;
        m.row -= 1;
        const toY = BATTLE_TOP + m.row * CELL_H + CELL_H * 0.5;
        if (toY - m.radius <= PLAYER_LINE_Y) {
          lineHits += m.type === "boss" ? 3 : 1;
          addStageMonsterDefeat(1);
          m.hp = 0;
        }
        if (m.hp <= 0) {
          m.y = toY;
          m.rowMoveAnim = null;
          m.rowMoveDisplayScale = 1;
        } else {
          m.rowMoveAnim = {
            t: 0,
            duration: MONSTER_ROW_MOVE_DURATION,
            fromY,
            toY
          };
          m.rowMoveDisplayScale = 1;
        }
      }
      state.monsters = state.monsters.filter((m) => m.hp > 0);
      if (lineHits > 0) {
        gameAudio.playHurt();
      }
      state.playerHp = clamp(state.playerHp - lineHits * 12, 0, state.playerMaxHp);

      state.moveStepsForReinforce = (state.moveStepsForReinforce || 0) + 1;
      if (state.moveStepsForReinforce >= STAGE_REINFORCE_MOVE_STEPS) {
        state.moveStepsForReinforce = 0;
        if ((state.reinforceCountThisRound || 0) < STAGE_REINFORCE_PER_ROUND) {
          spawnReinforcementFromQueue();
          state.reinforceCountThisRound = (state.reinforceCountThisRound || 0) + 1;
        }
      }
    }

    /** 当前大关全部波次清空后调用：进入下一大关（round+1），与是否从调试「第2关」开局无关 */
    function nextStage() {
      if (state.round >= MAX_ROUND) {
        state.gameOver = true;
        state.win = true;
        gameAudio.onGameOver(true);
        return;
      }

      state.round += 1;
      state.turn = 1;
      state.stageRound = 1;

      state.bombs.length = 0;
      state.laserBeams.length = 0;
      state.enemyBullets.length = 0;
      state.explosions.length = 0;
      state.damageTexts.length = 0;
      planStage();
      spawnWaveForStageRound(1);
      if (state.cats.length > 0) {
        state.shooterCursor = (state.shooterCursor + 1) % state.cats.length;
      }
      startTurn();
    }

    function resolveTurn() {
      if (state.gameOver || state.win) return;

      if (state.monsters.length === 0) {
        handleMonstersAllCleared();
        return;
      }

      state.turn += 1;
      moveMonstersForward();

      if (state.playerHp <= 0) {
        state.gameOver = true;
        state.win = false;
        gameAudio.onGameOver(false);
        return;
      }

      if (state.monsters.length === 0) {
        handleMonstersAllCleared();
        return;
      }

      if (state.cats.length > 0) {
        state.shooterCursor = (state.shooterCursor + 1) % state.cats.length;
      }
      startTurn();
    }

    function update(dt) {
      if (tutorialBlocksGame) return;
      updateMultiKill(dt);
      updateTurnAnnounce(dt);

      if (state.shakeTime > 0) {
        state.shakeTime = Math.max(0, state.shakeTime - dt);
        const decay = state.shakeTime / HIT_SHAKE_DURATION;
        state.shakeStrength = HIT_SHAKE_STRENGTH * decay;
      } else {
        state.shakeStrength = 0;
      }

      if (state.gameOver) return;

      if (state.roguePick && state.roguePick.active) {
        updateRoguePickAnim(dt);
        return;
      }

      updateBlueFireballSpawnQueue(dt);
      updateMonsterRowMove(dt);
      updateMonsterReinforceSpawn(dt);
      updateMonsterHitShake(dt);

      updateEggs(dt);
      updateBombs(dt);
      updateLaserBeams(dt);
      updateEnemyBullets(dt);
      updateExplosions(dt);
      updateDamageTexts(dt);
      updateCombo(dt);
      updateHudFx(dt);

      if (state.playerHp <= 0) {
        state.gameOver = true;
        state.win = false;
        gameAudio.onGameOver(false);
        return;
      }

      if (
        state.shotsLeft <= 0 &&
        state.eggs.length === 0 &&
        state.bombs.length === 0 &&
        state.laserBeams.length === 0 &&
        state.enemyBullets.length === 0
      ) {
        resolveTurn();
      }
    }

    function roundedRectPath(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function wrapHintTextLines(text, maxW, font) {
      const lines = [];
      ctx.save();
      ctx.font = font;
      let line = "";
      for (const ch of text) {
        const test = line + ch;
        if (ctx.measureText(test).width > maxW && line) {
          lines.push(line);
          line = ch;
        } else {
          line = test;
        }
      }
      if (line) lines.push(line);
      ctx.restore();
      return lines.length > 0 ? lines : [text];
    }

    /** HUD 下方回合技能说明（与调试面板 CAT_TOOLTIP_TEXT 独立） */
    const HUD_TURN_SKILL_HINT_LINES = {
      "狸花喵": "狸花喵：每次碰到怪物时，触发横向激光",
      "阿比喵": "阿比喵：达到一定连击数时，额外发射 1 发子弹",
      "蓝喵": "蓝喵：击杀怪物时额外发射 3 颗火球，火球还会造成范围爆炸伤害"
    };

    function getTurnSkillHintLine(cat) {
      if (!cat) return "";
      const hudLine = HUD_TURN_SKILL_HINT_LINES[cat.name];
      if (hudLine) return hudLine;
      const raw = CAT_TOOLTIP_TEXT[cat.name];
      if (!raw) return "";
      const m = raw.match(/技能效果：([^\n]+)/);
      const effect = m ? m[1].trim() : "";
      if (!effect) return "";
      return `${cat.name}：${effect}`;
    }

    function drawTurnSkillHint() {
      if (state.gameOver || state.win) return;
      const cat = getCurrentShooterCat();
      const fullText = getTurnSkillHintLine(cat);
      if (!fullText) return;
      const font = `600 ${TURN_HINT_FONT_PX}px Microsoft YaHei`;
      const maxW = W - 48;
      const lines = wrapHintTextLines(fullText, maxW, font);
      const clamped = lines.slice(0, 3);
      const cx = W / 2;
      const lineH = TURN_HINT_LINE_H;
      const firstY = HP_BAR_BOTTOM + 10 + lineH / 2;
      ctx.save();
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = font;
      ctx.lineJoin = "round";
      clamped.forEach((ln, i) => {
        const y = firstY + i * lineH;
        ctx.lineWidth = 4;
        ctx.strokeStyle = "rgba(48, 16, 32, 0.58)";
        ctx.strokeText(ln, cx, y);
        ctx.lineWidth = 2;
        ctx.strokeStyle = "rgba(200, 90, 130, 0.42)";
        ctx.strokeText(ln, cx, y);
        ctx.fillStyle = "#ffd6e8";
        ctx.fillText(ln, cx, y);
      });
      ctx.restore();
    }

    function drawRoundedRect(x, y, w, h, r, fill, stroke) {
      roundedRectPath(x, y, w, h, r);
      if (fill) {
        ctx.fillStyle = fill;
        ctx.fill();
      }
      if (stroke) {
        ctx.strokeStyle = stroke;
        ctx.stroke();
      }
    }

    function drawHud() {
      const p = getProgress();
      const stageTerrain = state.round === 1 ? "草原" : "沙漠";
      ctx.textAlign = "center";
      ctx.textBaseline = "alphabetic";
      ctx.font = `bold ${HUD_TITLE_FONT_PX}px Microsoft YaHei`;
      ctx.lineWidth = 5;
      ctx.lineJoin = "round";
      ctx.strokeStyle = "rgba(55,35,8,0.88)";
      ctx.strokeText(`第 ${state.round} 关  ${stageTerrain} (${p}%)`, W / 2, 70);
      ctx.fillStyle = HUD_THEME.roundText;
      ctx.fillText(`第 ${state.round} 关  ${stageTerrain} (${p}%)`, W / 2, 70);

      drawRoundedRect(120, HUD_PROGRESS_BAR_Y, 480, HUD_PROGRESS_BAR_H, 12, HUD_THEME.progressTrack, HUD_THEME.progressStroke);
      drawRoundedRect(124, 94, 472 * (p / 100), 16, 8, HUD_THEME.progressFill, null);
      const shooterIdx = state.cats.length > 0 ? state.shooterCursor % state.cats.length : -1;
      const hasProjectiles =
        state.eggs.length > 0 || state.bombs.length > 0 || state.laserBeams.length > 0;
      const catN = Math.max(1, state.cats.length);
      const slotW = CAT_HUD_WIDTH / catN;
      /** 每格略小于 slot，保留至少约 2px 缝，五猫时约 139px，比原 128 更大 */
      const cardW = Math.max(96, Math.min(200, Math.floor(slotW) - 2));
      const cardH = catN >= 5 ? 186 : 172;
      const NAME_COL_W = catN >= 5 ? 22 : 26;
      const CAT_AVATAR_SCALE_BOOST = 2.08;
      state.cats.forEach((d, i) => {
        const anchor = getCatAnchor(i);
        const cx = anchor.x;
        const isActive = i === shooterIdx && (state.shotsLeft > 0 || hasProjectiles);
        const floatY = isActive
          ? Math.sin(state.hudFx.time * HUD_FOCUS_FLOAT_SPEED + i * 0.95) * HUD_FOCUS_FLOAT_AMPLITUDE
          : 0;
        const flashRatio = isActive && HUD_FOCUS_FLASH_DURATION > 0
          ? clamp(state.hudFx.flashTimer / HUD_FOCUS_FLASH_DURATION, 0, 1)
          : 0;
        const avatarImg = catAvatarProcessed[d.name] || catAvatarImages[d.name];
        const canDrawAvatar = avatarImg
          && ((avatarImg.naturalWidth && avatarImg.naturalWidth > 0) || (avatarImg.width && avatarImg.width > 0));
        const avatarLeft = -cardW / 2 + NAME_COL_W + 1;
        const avatarRight = cardW / 2 - 4;
        const avatarTop = -cardH / 2 + 4;
        const avatarBottom = cardH / 2 - 6;
        const avatarBoxW = avatarRight - avatarLeft;
        const avatarMaxH = avatarBottom - avatarTop;
        const avatarBoxCenterX = (avatarLeft + avatarRight) / 2;
        const avatarBoxCenterY = (avatarTop + avatarBottom) / 2;
        const nameColCenterX = -cardW / 2 + NAME_COL_W / 2 + 16;
        const nameCharStep = 24;

        ctx.save();
        ctx.translate(cx, anchor.y);
        ctx.globalAlpha = isActive ? 1 : 0.78;

        ctx.save();
        roundedRectPath(avatarLeft, avatarTop, avatarBoxW, avatarMaxH, 16);
        ctx.clip();

        ctx.save();
        ctx.translate(0, floatY);

        if (canDrawAvatar) {
          const iw = avatarImg.naturalWidth || avatarImg.width;
          const ih = avatarImg.naturalHeight || avatarImg.height;
          let scale = Math.min(avatarBoxW / iw, avatarMaxH / ih) * CAT_AVATAR_SCALE_BOOST;
          let drawW = iw * scale;
          let drawH = ih * scale;
          if (drawH > avatarMaxH) {
            const f = avatarMaxH / drawH;
            drawW *= f;
            drawH *= f;
          }
          if (drawW > avatarBoxW) {
            const f = avatarBoxW / drawW;
            drawW *= f;
            drawH *= f;
          }
          ctx.drawImage(
            avatarImg,
            avatarBoxCenterX - drawW / 2,
            avatarBoxCenterY - drawH / 2,
            drawW,
            drawH
          );
        } else {
          const rx = Math.min(avatarBoxW * 0.48, 82);
          const ry = Math.min(avatarMaxH * 0.48, 72);
          ctx.beginPath();
          ctx.fillStyle = d.color;
          ctx.ellipse(avatarBoxCenterX, avatarBoxCenterY, rx, ry, 0, 0, Math.PI * 2);
          ctx.fill();
        }

        if (flashRatio > 0) {
          drawRoundedRect(
            avatarLeft + 3,
            avatarTop + 3,
            avatarBoxW - 6,
            avatarMaxH - 6,
            12,
            `rgba(255,245,180,${0.32 * flashRatio})`,
            null
          );
        }

        ctx.restore();
        ctx.restore();

        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = "bold 22px Microsoft YaHei";
        ctx.lineJoin = "round";
        ctx.lineWidth = 3;
        const nameChars = Array.from(d.name);
        const nameBlockH = (nameChars.length - 1) * nameCharStep;
        let ny = -nameBlockH / 2;
        for (const ch of nameChars) {
          ctx.strokeStyle = "rgba(255,255,255,0.9)";
          ctx.strokeText(ch, nameColCenterX, ny);
          ctx.fillStyle = "#1a2d4a";
          ctx.fillText(ch, nameColCenterX, ny);
          ny += nameCharStep;
        }
        ctx.textBaseline = "alphabetic";

        ctx.restore();
      });

      const hpInnerPad = 3;
      const hpInnerH = HP_BAR_HEIGHT - hpInnerPad * 2;
      const hpInnerY = HP_BAR_TOP + hpInnerPad;
      drawRoundedRect(40, HP_BAR_TOP, W - 80, HP_BAR_HEIGHT, 10, HUD_THEME.hpTrack, HUD_THEME.hpTrackStroke);
      drawRoundedRect(
        44,
        hpInnerY,
        (W - 88) * (state.playerHp / state.playerMaxHp),
        hpInnerH,
        6,
        HUD_THEME.hpFill,
        null
      );
      const hpTextY = HP_BAR_TOP + HP_BAR_HEIGHT / 2;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = HP_TEXT_FONT;
      ctx.lineWidth = 4;
      ctx.strokeStyle = HUD_THEME.hpTextStroke;
      const hpLabel = `生命值 ${state.playerHp}/${state.playerMaxHp}`;
      ctx.strokeText(hpLabel, W / 2, hpTextY);
      ctx.fillStyle = HUD_THEME.hpText;
      ctx.fillText(hpLabel, W / 2, hpTextY);
      ctx.textBaseline = "alphabetic";

      drawTurnSkillHint();

      ctx.setLineDash([10, 12]);
      ctx.strokeStyle = "#ffffffc0";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(20, PLAYER_LINE_Y);
      ctx.lineTo(W - 20, PLAYER_LINE_Y);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    function drawBattleField() {
      const g = ctx.createLinearGradient(0, BATTLE_TOP, 0, H);
      g.addColorStop(0, "#d5f49a");
      g.addColorStop(1, "#f57f17");
      ctx.fillStyle = g;
      ctx.fillRect(0, BATTLE_TOP, W, H - BATTLE_TOP);
    }

    function drawEnemyBullets() {
      for (const b of state.enemyBullets) {
        const angle =
          Math.atan2(b.vy, b.vx || 0) + ENEMY_BULLET_SPRITE_ANGLE_OFFSET;
        const drawR = ENEMY_BULLET_SPRITE_DRAW_R * ENEMY_BULLET_SPRITE_VISUAL_MULT;
        if (drawBulletSpriteIfReady("enemyBullet", b.x, b.y, drawR, angle)) continue;
        ctx.save();
        ctx.shadowBlur = 12;
        ctx.shadowColor = "rgba(255, 120, 40, 0.55)";
        ctx.beginPath();
        ctx.fillStyle = "#ff7043";
        ctx.arc(b.x, b.y, drawR, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#fff5e6";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawLaserBeams() {
      for (const lb of state.laserBeams) {
        const t = clamp(lb.age / lb.duration, 0, 1);
        const alpha = (1 - t) * (1 - t);
        const y0 = lb.y - LIHUA_LASER_HALF_THICKNESS;
        const h = LIHUA_LASER_HALF_THICKNESS * 2;
        const g = ctx.createLinearGradient(0, y0, 0, y0 + h);
        g.addColorStop(0, `rgba(80, 30, 160, 0)`);
        g.addColorStop(0.45, `rgba(160, 90, 235, ${0.42 * alpha})`);
        g.addColorStop(0.55, `rgba(235, 210, 255, ${0.55 * alpha})`);
        g.addColorStop(1, `rgba(80, 30, 160, 0)`);
        ctx.fillStyle = g;
        ctx.fillRect(0, y0, W, h);
        const edge = LIHUA_LASER_HALF_THICKNESS * 0.25;
        ctx.strokeStyle = `rgba(230, 200, 255, ${0.9 * alpha})`;
        ctx.lineWidth = Math.max(3, Math.round(LIHUA_LASER_HALF_THICKNESS / 5));
        ctx.beginPath();
        ctx.moveTo(8, lb.y);
        ctx.lineTo(W - 8, lb.y);
        ctx.stroke();
        ctx.strokeStyle = `rgba(255, 220, 255, ${0.35 * alpha})`;
        ctx.lineWidth = Math.max(1, Math.round(LIHUA_LASER_HALF_THICKNESS / 10));
        ctx.beginPath();
        ctx.moveTo(0, lb.y - edge);
        ctx.lineTo(W, lb.y - edge);
        ctx.moveTo(0, lb.y + edge);
        ctx.lineTo(W, lb.y + edge);
        ctx.stroke();
      }
    }

    function drawMonsters() {
      for (const m of state.monsters) {
        const sprite =
          m.type === "boss"
            ? monsterImageProcessed.boss || monsterImages.boss
            : m.type === "bombMob"
              ? monsterImageProcessed.bombMob || monsterImages.bombMob
              : m.type === "chest"
                ? monsterImageProcessed.chest || monsterImages.chest
                : m.type === "shooterMob"
                  ? monsterImageProcessed.shooterMob || monsterImages.shooterMob
                  : monsterImageProcessed.normal || monsterImages.normal;
        const canDrawSprite =
          sprite &&
          ((sprite.naturalWidth && sprite.naturalWidth > 0) || (sprite.width && sprite.width > 0));
        const bodyRadius = m.radius * (m.type === "boss" ? 1.02 : 0.98);
        const perspectiveS = m.rowMoveDisplayScale ?? 1;
        const hitScale = getMonsterHitScale(m);
        const rsp = getReinforceSpawnPresent(m);
        const combinedScale = perspectiveS * hitScale * rsp.scale;
        const sh = getMonsterHitShakeOffset(m);
        const needHitShake = sh.x * sh.x + sh.y * sh.y > 0.0001;
        const needSpawnFx = m.reinforceSpawnAge != null;
        if (needSpawnFx) {
          ctx.save();
          ctx.globalAlpha *= rsp.alpha;
          ctx.translate(0, rsp.dy);
        }
        if (needHitShake) {
          ctx.save();
          ctx.translate(sh.x, sh.y);
        }
        if (Math.abs(combinedScale - 1) > 1e-4) {
          ctx.save();
          ctx.translate(m.x, m.y);
          ctx.scale(combinedScale, combinedScale);
          ctx.translate(-m.x, -m.y);
        }

        // 地面阴影，增强单位立体感
        ctx.beginPath();
        ctx.fillStyle = "rgba(0,0,0,0.22)";
        ctx.ellipse(m.x, m.y + bodyRadius * 0.72, bodyRadius * 0.58, bodyRadius * 0.22, 0, 0, Math.PI * 2);
        ctx.fill();

        if (canDrawSprite) {
          const spriteW = sprite.naturalWidth || sprite.width;
          const spriteH = sprite.naturalHeight || sprite.height;
          const ringR = bodyRadius * 0.96;
          const targetFaceD = ringR * 2;
          const facePx = Math.min(spriteW, spriteH) * MONSTER_NORMAL_FACE_FRAC;
          const dispScale =
            m.type === "boss"
              ? MONSTER_BOSS_DISPLAY_SCALE
              : MONSTER_NORMAL_DISPLAY_SCALE;
          const scale = (targetFaceD / facePx) * dispScale;
          const drawW = spriteW * scale;
          const drawH = spriteH * scale;
          ctx.drawImage(sprite, m.x - drawW / 2, m.y - drawH / 2, drawW, drawH);
        } else if (m.type === "chest") {
          const bw = bodyRadius * 1.7;
          const bh = bodyRadius * 1.28;
          const rx = m.x - bw / 2;
          const ry = m.y - bh / 2;
          const g = ctx.createLinearGradient(rx, ry, rx + bw, ry + bh);
          g.addColorStop(0, "#fff3c4");
          g.addColorStop(0.4, "#ffb300");
          g.addColorStop(1, "#c66900");
          roundedRectPath(rx, ry, bw, bh, 12);
          ctx.fillStyle = g;
          ctx.fill();
          ctx.strokeStyle = "rgba(110, 55, 0, 0.95)";
          ctx.lineWidth = 3;
          ctx.stroke();
          ctx.beginPath();
          ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
          ctx.lineWidth = 2;
          roundedRectPath(rx + 4, ry + 4, bw - 8, bh - 8, 9);
          ctx.stroke();
          ctx.font = `bold ${Math.round(bodyRadius * 0.5)}px Microsoft YaHei`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.lineWidth = 4;
          ctx.strokeStyle = "rgba(60, 30, 0, 0.55)";
          ctx.strokeText("箱", m.x, m.y + bodyRadius * 0.06);
          ctx.fillStyle = "rgba(55, 25, 0, 0.92)";
          ctx.fillText("箱", m.x, m.y + bodyRadius * 0.06);
          ctx.beginPath();
          ctx.strokeStyle = "rgba(255, 215, 120, 0.9)";
          ctx.lineWidth = 3;
          ctx.arc(m.x, m.y, bodyRadius * 1.14, 0, Math.PI * 2);
          ctx.stroke();
        } else {
          ctx.beginPath();
          if (m.type === "boss") {
            ctx.fillStyle = "#8e44ad";
            ctx.strokeStyle = "#ffffffcc";
            ctx.lineWidth = 3;
          } else if (m.type === "bombMob") {
            ctx.fillStyle = "#2c2c2c";
            ctx.strokeStyle = "#f1c40f";
            ctx.lineWidth = 3;
          } else if (m.type === "shooterMob") {
            ctx.fillStyle = "#c0392b";
            ctx.strokeStyle = "#fadbd8";
            ctx.lineWidth = 3;
          } else {
            ctx.fillStyle = "#4fc3f7";
            ctx.strokeStyle = "#ffffffcc";
            ctx.lineWidth = 3;
          }
          ctx.arc(m.x, m.y, m.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
        }

        const hitFlashA = getMonsterHitFlashAlpha(m);
        if (hitFlashA > 0.008) {
          ctx.save();
          ctx.globalAlpha *= hitFlashA;
          ctx.fillStyle = "#ffffff";
          ctx.beginPath();
          if (m.type === "boss") {
            ctx.arc(m.x, m.y, bodyRadius * 0.94, 0, Math.PI * 2);
          } else {
            ctx.arc(m.x, m.y, bodyRadius * 0.98, 0, Math.PI * 2);
          }
          ctx.fill();
          ctx.restore();
        }

        if (m.type !== "bombMob" && m.type !== "chest") {
          const hpText = String(Math.max(0, Math.floor(m.hp)));
          const hpFont = m.type === "boss" ? 40 : 34;
          ctx.font = `bold ${hpFont}px Microsoft YaHei`;
          ctx.textAlign = "center";
          ctx.lineWidth = 5;
          ctx.strokeStyle = "#12345d";
          const hpTextYOffset = m.type === "boss" ? bodyRadius * 0.5 : bodyRadius * 0.66;
          ctx.strokeText(hpText, m.x, m.y + hpTextYOffset);
          ctx.fillStyle = "#f5fbff";
          ctx.fillText(hpText, m.x, m.y + hpTextYOffset);
        }
        if (Math.abs(combinedScale - 1) > 1e-4) ctx.restore();
        if (needHitShake) ctx.restore();
        if (needSpawnFx) ctx.restore();
      }
    }

    /** 拖尾条带 + 脚下光晕（kind 对应各猫配色） */
    function drawTrailRibbonAndGlow(trail, cx, cy, r, kind) {
      if (!trail || trail.length < 2) return;
      ctx.save();
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.beginPath();
      ctx.moveTo(trail[0].x, trail[0].y);
      for (let i = 1; i < trail.length; i += 1) ctx.lineTo(trail[i].x, trail[i].y);
      const t0 = trail[0];
      const t1 = trail[trail.length - 1];
      let grd;
      let lineW;
      let glowR;
      switch (kind) {
        case "abiHoming":
          grd = ctx.createLinearGradient(t0.x, t0.y, t1.x, t1.y);
          grd.addColorStop(0, "rgba(255, 170, 255, 0.12)");
          grd.addColorStop(0.45, "rgba(210, 120, 255, 0.32)");
          grd.addColorStop(1, "rgba(170, 80, 255, 0.5)");
          lineW = r * 0.88;
          glowR = 2.45;
          break;
        case "abi":
          grd = ctx.createLinearGradient(t0.x, t0.y, t1.x, t1.y);
          grd.addColorStop(0, "rgba(230, 190, 255, 0.1)");
          grd.addColorStop(0.5, "rgba(190, 130, 255, 0.28)");
          grd.addColorStop(1, "rgba(160, 100, 230, 0.45)");
          lineW = r * 0.72;
          glowR = 2.05;
          break;
        case "split":
          grd = ctx.createLinearGradient(t0.x, t0.y, t1.x, t1.y);
          grd.addColorStop(0, "rgba(180, 240, 255, 0.14)");
          grd.addColorStop(0.45, "rgba(80, 200, 255, 0.38)");
          grd.addColorStop(1, "rgba(40, 160, 255, 0.52)");
          lineW = r * 0.65;
          glowR = 1.95;
          break;
        case "bomb":
          grd = ctx.createLinearGradient(t0.x, t0.y, t1.x, t1.y);
          grd.addColorStop(0, "rgba(255, 220, 160, 0.16)");
          grd.addColorStop(0.4, "rgba(255, 130, 60, 0.4)");
          grd.addColorStop(1, "rgba(255, 70, 40, 0.55)");
          lineW = r * 0.78;
          glowR = 2.15;
          break;
        case "lihua":
          grd = ctx.createLinearGradient(t0.x, t0.y, t1.x, t1.y);
          grd.addColorStop(0, "rgba(220, 255, 180, 0.14)");
          grd.addColorStop(0.45, "rgba(150, 255, 90, 0.4)");
          grd.addColorStop(1, "rgba(100, 220, 60, 0.52)");
          lineW = r * 0.7;
          glowR = 2.0;
          break;
        case "lan":
          grd = ctx.createLinearGradient(t0.x, t0.y, t1.x, t1.y);
          grd.addColorStop(0, "rgba(180, 230, 255, 0.12)");
          grd.addColorStop(0.5, "rgba(100, 190, 255, 0.34)");
          grd.addColorStop(1, "rgba(60, 150, 255, 0.48)");
          lineW = r * 0.68;
          glowR = 1.9;
          break;
        case "lanFire":
          grd = ctx.createLinearGradient(t0.x, t0.y, t1.x, t1.y);
          grd.addColorStop(0, "rgba(255, 240, 200, 0.14)");
          grd.addColorStop(0.4, "rgba(255, 150, 60, 0.42)");
          grd.addColorStop(1, "rgba(255, 90, 30, 0.55)");
          lineW = r * 0.92;
          glowR = 2.55;
          break;
        default:
          grd = ctx.createLinearGradient(t0.x, t0.y, t1.x, t1.y);
          grd.addColorStop(0, "rgba(255, 245, 220, 0.1)");
          grd.addColorStop(0.5, "rgba(255, 220, 160, 0.28)");
          grd.addColorStop(1, "rgba(255, 200, 120, 0.4)");
          lineW = r * 0.62;
          glowR = 1.85;
      }
      ctx.strokeStyle = grd;
      ctx.lineWidth = lineW;
      ctx.stroke();
      ctx.restore();

      const g = ctx.createRadialGradient(cx, cy, r * 0.1, cx, cy, r * glowR);
      switch (kind) {
        case "abiHoming":
          g.addColorStop(0, "rgba(255, 210, 255, 0.38)");
          g.addColorStop(0.42, "rgba(170, 100, 255, 0.16)");
          g.addColorStop(1, "rgba(60, 30, 100, 0)");
          break;
        case "abi":
          g.addColorStop(0, "rgba(235, 200, 255, 0.22)");
          g.addColorStop(0.5, "rgba(160, 110, 230, 0.12)");
          g.addColorStop(1, "rgba(60, 30, 100, 0)");
          break;
        case "split":
          g.addColorStop(0, "rgba(180, 240, 255, 0.28)");
          g.addColorStop(0.45, "rgba(60, 180, 255, 0.12)");
          g.addColorStop(1, "rgba(30, 80, 120, 0)");
          break;
        case "bomb":
          g.addColorStop(0, "rgba(255, 200, 120, 0.32)");
          g.addColorStop(0.45, "rgba(255, 100, 50, 0.14)");
          g.addColorStop(1, "rgba(80, 30, 10, 0)");
          break;
        case "lihua":
          g.addColorStop(0, "rgba(230, 255, 160, 0.3)");
          g.addColorStop(0.42, "rgba(120, 255, 80, 0.14)");
          g.addColorStop(1, "rgba(40, 80, 20, 0)");
          break;
        case "lan":
          g.addColorStop(0, "rgba(200, 235, 255, 0.26)");
          g.addColorStop(0.45, "rgba(80, 170, 255, 0.12)");
          g.addColorStop(1, "rgba(30, 60, 100, 0)");
          break;
        case "lanFire":
          g.addColorStop(0, "rgba(255, 220, 160, 0.4)");
          g.addColorStop(0.4, "rgba(255, 120, 40, 0.2)");
          g.addColorStop(1, "rgba(80, 30, 5, 0)");
          break;
        default:
          g.addColorStop(0, "rgba(255, 240, 200, 0.22)");
          g.addColorStop(0.5, "rgba(255, 200, 120, 0.1)");
          g.addColorStop(1, "rgba(80, 60, 0, 0)");
      }
      ctx.beginPath();
      ctx.fillStyle = g;
      ctx.arc(cx, cy, r * glowR, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawBulletTrailFxBehind(e) {
      drawTrailRibbonAndGlow(e.bulletTrail, e.x, e.y, e.radius, resolveBulletTrailKind(e));
    }

    function getBulletDrawScaleForEgg(e) {
      if (e.rogueRain) return 1;
      const k = resolveBulletTrailKind(e);
      if (k === "abiHoming") return ABI_HOMING_BULLET_DRAW_SCALE;
      if (k === "lanFire") return 1.12 * BLUE_FIREBALL_SPRITE_DRAW_MULT;
      if (k === "abi") return 1.05;
      if (k === "lan") return 1.04;
      if (k === "split") return e.damageMin === SPLIT_EGG_HIT_DAMAGE_MIN ? 1.02 : 1.04;
      if (k === "bomb") return 1.05;
      if (k === "lihua") return 1.04;
      return 1.02;
    }

    function applyEggBulletShadow(e) {
      const k = resolveBulletTrailKind(e);
      if (k === "abiHoming") {
        ctx.shadowBlur = 14;
        ctx.shadowColor = "rgba(160, 90, 220, 0.55)";
      } else if (k === "lanFire") {
        ctx.shadowBlur = 16;
        ctx.shadowColor = "rgba(255, 120, 40, 0.55)";
      } else if (k === "abi") {
        ctx.shadowBlur = 10;
        ctx.shadowColor = "rgba(150, 100, 210, 0.42)";
      } else if (k === "lan") {
        ctx.shadowBlur = 9;
        ctx.shadowColor = "rgba(80, 170, 255, 0.45)";
      } else if (k === "split") {
        ctx.shadowBlur = 9;
        ctx.shadowColor = "rgba(60, 180, 255, 0.4)";
      } else if (k === "bomb") {
        ctx.shadowBlur = 11;
        ctx.shadowColor = "rgba(255, 120, 50, 0.48)";
      } else if (k === "lihua") {
        ctx.shadowBlur = 10;
        ctx.shadowColor = "rgba(130, 255, 80, 0.42)";
      } else {
        ctx.shadowBlur = 7;
        ctx.shadowColor = "rgba(255, 200, 120, 0.28)";
      }
    }

    function fallbackEggBulletColors(e) {
      const k = resolveBulletTrailKind(e);
      if (k === "abiHoming" || k === "abi") return { fill: "#f8e0ff", stroke: "#c98cff" };
      if (k === "lanFire") return { fill: "#ffe8d0", stroke: "#ff8c42" };
      if (k === "lan") return { fill: "#e0f4ff", stroke: "#4aa8ff" };
      if (k === "split") return { fill: "#dff6ff", stroke: "#4cc4ff" };
      if (k === "bomb") return { fill: "#ffe8d6", stroke: "#ff8c42" };
      if (k === "lihua") return { fill: "#efffdd", stroke: "#7fe04a" };
      return { fill: "#fffef4", stroke: "#f7d76a" };
    }

    function drawEggs() {
      for (const e of state.eggs) {
        if (e.bulletTrail && e.bulletTrail.length >= 2) drawBulletTrailFxBehind(e);
      }
      for (const e of state.eggs) {
        const key =
          e.bulletSpriteKey ||
          resolveEggBulletSpriteKey({
            ownerCatName: e.ownerCatName,
            damageMin: e.damageMin,
            homingTargetId: e.homingTargetId,
            blueFireball: !!e.blueFireball,
            rogueRain: !!e.rogueRain
          });
        const angle =
          typeof e.bulletDrawAngle === "number" ? e.bulletDrawAngle : Math.atan2(e.vy, e.vx);
        const drawR = e.radius * getBulletDrawScaleForEgg(e);
        ctx.save();
        applyEggBulletShadow(e);
        const ok = drawBulletSpriteIfReady(key, e.x, e.y, drawR, angle);
        ctx.restore();
        if (!ok) {
          const c = fallbackEggBulletColors(e);
          ctx.beginPath();
          ctx.fillStyle = c.fill;
          ctx.strokeStyle = c.stroke;
          ctx.lineWidth = 2;
          ctx.arc(e.x, e.y, drawR, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
        }
      }
    }

    function drawBombs() {
      for (const b of state.bombs) {
        if (b.isFlying && b.bulletTrail && b.bulletTrail.length >= 2) {
          drawTrailRibbonAndGlow(b.bulletTrail, b.x, b.y, b.radius, "bomb");
        }
      }
      for (const b of state.bombs) {
        const wobbleX = b.isFlying ? 0 : Math.sin(b.age * BOMB_SHAKE_FREQUENCY + b.phase) * BOMB_SHAKE_AMPLITUDE;
        const wobbleY = b.isFlying ? 0 : Math.cos(b.age * BOMB_SHAKE_FREQUENCY + b.phase) * BOMB_SHAKE_AMPLITUDE * 0.45;
        const cx = b.x + wobbleX;
        const cy = b.y + wobbleY;
        const speed = Math.hypot(b.vx, b.vy);
        const bombAngle =
          typeof b.bulletDrawAngle === "number" && speed > 8
            ? b.bulletDrawAngle
            : speed > 8
              ? Math.atan2(b.vy, b.vx)
              : 0;
        const drawR = b.radius * BOMB_BULLET_SPRITE_DISPLAY_SCALE * (b.isFlying ? 1.04 : 1);
        ctx.save();
        if (b.isFlying) {
          ctx.shadowBlur = 12;
          ctx.shadowColor = "rgba(255, 110, 40, 0.5)";
        }
        const ok = drawBulletSpriteIfReady("bomb", cx, cy, drawR, bombAngle);
        ctx.restore();
        if (!ok) {
          ctx.beginPath();
          ctx.fillStyle = "#ff4d4f";
          ctx.strokeStyle = "#ffd6d6";
          ctx.lineWidth = 2;
          ctx.arc(cx, cy, drawR, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
        }

        if (!b.isFlying) {
          ctx.save();
          const timerStr = `${Math.max(0, b.timer).toFixed(1)}s`;
          ctx.font = "bold 27px Microsoft YaHei";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.lineWidth = 3;
          ctx.strokeStyle = "#000000";
          const timerY = cy + 8;
          ctx.strokeText(timerStr, cx, timerY);
          ctx.fillStyle = "#ff3333";
          ctx.fillText(timerStr, cx, timerY);
          ctx.restore();
        }
      }
    }

    function drawExplosions() {
      for (const e of state.explosions) {
        const t = clamp(e.time / e.duration, 0, 1);
        const easeOut = 1 - (1 - t) * (1 - t);
        const currentRadius = e.radius * easeOut;
        const flashAlpha = clamp(1 - e.time / BOMB_FLASH_DURATION, 0, 1);

        if (flashAlpha > 0) {
          ctx.beginPath();
          ctx.fillStyle = `rgba(255,255,235,${0.8 * flashAlpha})`;
          ctx.arc(e.x, e.y, e.radius * 0.68, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.beginPath();
        ctx.strokeStyle = `rgba(255,76,76,${0.85 * (1 - t)})`;
        ctx.lineWidth = 9 * (1 - t) + 1;
        ctx.arc(e.x, e.y, currentRadius, 0, Math.PI * 2);
        ctx.stroke();

        ctx.beginPath();
        ctx.strokeStyle = `rgba(255,184,77,${0.7 * (1 - t)})`;
        ctx.lineWidth = 4 * (1 - t) + 1;
        ctx.arc(e.x, e.y, currentRadius * 0.62, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function drawDamageTexts() {
      for (const t of state.damageTexts) {
        const progress = clamp(t.age / t.duration, 0, 1);
        const y = t.y - t.rise * progress;
        const alpha =
          progress < DAMAGE_TEXT_OPAQUE_UNTIL
            ? 1
            : (1 - progress) / (1 - DAMAGE_TEXT_OPAQUE_UNTIL);
        const popT = Math.min(t.age / DAMAGE_TEXT_POP_DURATION, 1);
        const popEase = 1 - Math.pow(1 - popT, 3);
        const scale = 1 + DAMAGE_TEXT_IMPACT_SCALE * (1 - popEase);
        const seed = t.impactSeed != null ? t.impactSeed : 0;
        const shake = (1 - popT) * 5;
        const ox = Math.sin(t.age * 90 + seed) * shake;
        const oy = Math.cos(t.age * 72 + seed) * shake * 0.4;
        const rot = (1 - popT) * 0.11 * Math.sin(t.age * 38 + seed);
        const text = `-${t.damage}`;
        const fp = t.fontSize;

        ctx.save();
        ctx.translate(t.x + ox, y + oy);
        ctx.rotate(rot);
        ctx.scale(scale, scale);
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = `bold ${fp}px Microsoft YaHei`;
        ctx.lineJoin = "round";

        const glowA = 0.6 * alpha * (1 - progress * 0.75);
        ctx.shadowBlur = 22 * glowA;
        ctx.shadowColor = `rgba(255, 60, 110, ${0.85 * alpha})`;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 0;

        ctx.lineWidth = Math.max(6, fp * 0.16);
        ctx.strokeStyle = `rgba(28, 6, 12, ${alpha})`;
        ctx.strokeText(text, 0, 0);
        ctx.shadowBlur = 0;
        ctx.lineWidth = Math.max(2, fp * 0.06);
        ctx.strokeStyle = `rgba(255, 240, 225, ${Math.min(1, 0.94 * alpha)})`;
        ctx.strokeText(text, 0, 0);

        const g = ctx.createLinearGradient(0, -fp * 0.55, 0, fp * 0.45);
        g.addColorStop(0, `rgba(255, 252, 235, ${alpha})`);
        g.addColorStop(0.42, `rgba(255, 210, 100, ${alpha})`);
        g.addColorStop(0.78, `rgba(255, 95, 70, ${alpha})`);
        g.addColorStop(1, `rgba(235, 35, 75, ${alpha})`);
        ctx.fillStyle = g;
        ctx.fillText(text, 0, 0);
        ctx.restore();
      }
    }

    function drawCombo() {
      if (!state.combo.active || state.combo.count < COMBO_MIN_DISPLAY) return;

    function decimateAimPathForDraw(points, minDist) {
      if (points.length <= 2) return points;
      const out = [points[0]];
      for (let i = 1; i < points.length - 1; i += 1) {
        const p = points[i];
        const last = out[out.length - 1];
        if (Math.hypot(p.x - last.x, p.y - last.y) >= minDist) out.push(p);
      }
      const end = points[points.length - 1];
      const last = out[out.length - 1];
      if (Math.hypot(end.x - last.x, end.y - last.y) > 0.5) out.push(end);
      return out;
    }

    function drawAimLine() {
      if (!state.aiming || state.shotsLeft <= 0 || state.gameOver) return;
      if (state.roguePick && state.roguePick.active) return;
      const origin = getCurrentShootOrigin();
      let dx = state.aimPos.x - origin.x;
      let dy = state.aimPos.y - origin.y;
      if (dy < 30) dy = 30;
      const dir = normalize(dx, dy);
      const pathRaw = buildAimPath(dir, origin, getAimPathOptsForCurrentShot());
      const path = decimateAimPathForDraw(pathRaw, AIM_DRAW_MIN_POINT_DIST);
      if (path.length < 2) return;

      const dashPattern = [12, 10];
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      function strokePath(strokeStyle, lineW, dash, blur, blurColor) {
        ctx.beginPath();
        ctx.moveTo(path[0].x, path[0].y);
        for (let i = 1; i < path.length; i += 1) {
          ctx.lineTo(path[i].x, path[i].y);
        }
        ctx.strokeStyle = strokeStyle;
        ctx.lineWidth = lineW;
        ctx.setLineDash(dash);
        ctx.shadowBlur = blur;
        ctx.shadowColor = blurColor || "transparent";
        ctx.stroke();
      }

      ctx.save();
      ctx.globalAlpha = 0.92;
      strokePath("rgba(35, 75, 120, 0.55)", 9.75, dashPattern, 21, "rgba(60, 140, 220, 0.45)");
      ctx.shadowBlur = 0;
      strokePath("rgba(255, 252, 245, 0.98)", 4.8, dashPattern, 0, "");
      strokePath("rgba(120, 210, 255, 0.88)", 2.1, dashPattern, 0, "");
      ctx.restore();
      ctx.setLineDash([]);

      ctx.beginPath();
      ctx.fillStyle = "#ffe082";
      ctx.arc(origin.x, origin.y, 18, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "rgba(255, 255, 255, 0.88)";
      ctx.lineWidth = 3.3;
      ctx.stroke();
    }
