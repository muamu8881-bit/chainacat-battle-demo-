          borderOuter: "rgba(255, 190, 150, 0.95)",
          borderInner: "rgba(255, 120, 100, 0.38)",
          shineTop: "rgba(255, 200, 200, 0.12)",
          descFill: "rgba(0, 0, 0, 0.22)",
          corner: "rgba(255, 200, 160, 0.5)"
        };
      }
      return {
        stops: [
          [0, "#2a6a72"],
          [0.38, "#143038"],
          [1, "#040a0e"]
        ],
        titleGrad0: "#f0ffff",
        titleGrad1: "#4dd0e1",
        borderOuter: "rgba(180, 235, 255, 0.92)",
        borderInner: "rgba(100, 200, 220, 0.35)",
        shineTop: "rgba(200, 255, 255, 0.14)",
        descFill: "rgba(0, 0, 0, 0.2)",
        corner: "rgba(180, 220, 230, 0.5)"
      };
    }

    /** 卡面局部坐标 (lx,ly) 映到屏上，使文字随牌位移动/旋转但不随 scale 被拉伸 */
    function mapRogueCardToScreen(lx, ly, cardCx, cardCy, s) {
      return {
        x: cardCx + s * (lx - cardCx),
        y: cardCy + s * (ly - cardCy)
      };
    }

    const ROGUE_TITLE_PX = Math.round(31 * 1.3);
    /** 白/浅字（说明等）相对上一版再 ×0.7；主标题巨型弹等仍为 ROGUE_TITLE_PX */
    const ROGUE_DESC_PX = Math.round(19 * 1.5 * 0.7);
    const ROGUE_DESC_LINE_GAP = Math.round(34 * 0.7);
    /** 顶栏「选择一张增益卡牌」；为当前缩放的 2 倍 */
    const ROGUE_OVERLAY_TITLE_PX = Math.round(34 * 0.7 * 2);

    /** 只画卡面底图与内框，不含文字（文字在屏上按固定 px 画，避免随缩放动效被拉大缩小） */
    function drawRogueCardBackground(ctx, x, y, w, h, card) {
      const r = 18;
      const th = rogueCardThemeById(card.id);
      const pad = 3;

      ctx.save();
      ctx.shadowColor = "rgba(0, 0, 0, 0.5)";
      ctx.shadowBlur = 24;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 10;
      const gBg = ctx.createLinearGradient(x, y, x, y + h);
      th.stops.forEach(([p, c]) => gBg.addColorStop(p, c));
      roundedRectPath(x, y, w, h, r);
      ctx.fillStyle = gBg;
      ctx.fill();
      ctx.shadowColor = "transparent";
      ctx.shadowBlur = 0;
      ctx.shadowOffsetY = 0;

      const gSh = ctx.createLinearGradient(x, y, x, y + h * 0.5);
      gSh.addColorStop(0, th.shineTop);
      gSh.addColorStop(0.5, "rgba(255,255,255,0.03)");
      gSh.addColorStop(1, "rgba(255,255,255,0)");
      roundedRectPath(x, y, w, h, r);
      ctx.fillStyle = gSh;
      ctx.fill();

      ctx.save();
      roundedRectPath(x, y, w, h, r);
      ctx.clip();
      const gV = ctx.createLinearGradient(x, y + h * 0.15, x, y + h);
      gV.addColorStop(0, "rgba(0,0,0,0)");
      gV.addColorStop(1, "rgba(0,0,0,0.28)");
      ctx.fillStyle = gV;
      ctx.fillRect(x, y, w, h);
      ctx.restore();

      ctx.strokeStyle = th.borderOuter;
      ctx.lineWidth = 2.5;
      roundedRectPath(x, y, w, h, r);
      ctx.stroke();
      ctx.strokeStyle = th.borderInner;
      ctx.lineWidth = 1.1;
      roundedRectPath(x + pad + 1, y + pad + 1, w - 2 * (pad + 1), h - 2 * (pad + 1), r - 2);
      ctx.stroke();

      const o = 7;
      const L = 15;
      ctx.strokeStyle = th.corner;
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ctx.moveTo(x + o, y + o + L);
      ctx.lineTo(x + o, y + o);
      ctx.lineTo(x + o + L, y + o);
      ctx.moveTo(x + w - o, y + o + L);
      ctx.lineTo(x + w - o, y + o);
      ctx.lineTo(x + w - o - L, y + o);
      ctx.moveTo(x + o, y + h - o - L);
      ctx.lineTo(x + o, y + h - o);
      ctx.lineTo(x + o + L, y + h - o);
      ctx.moveTo(x + w - o, y + h - o - L);
      ctx.lineTo(x + w - o, y + h - o);
      ctx.lineTo(x + w - o - L, y + h - o);
      ctx.stroke();

      ctx.strokeStyle = "rgba(255, 220, 160, 0.35)";
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(x + 22, y + 70);
      ctx.lineTo(x + w - 22, y + 70);
      ctx.stroke();

      const blockY = y + 80;
      const blockH = h - 80 - 16;
      roundedRectPath(x + 10, blockY, w - 20, blockH, 12);
      ctx.fillStyle = th.descFill;
      ctx.fill();
      ctx.strokeStyle = "rgba(255, 255, 255, 0.1)";
      ctx.lineWidth = 1;
      roundedRectPath(x + 10, blockY, w - 20, blockH, 12);
      ctx.stroke();
      ctx.restore();
    }

    function drawRogueCardText(ctx, x, y, w, h, card, cardCx, cardCy, s) {
      const th = rogueCardThemeById(card.id);
      const m = (lx, ly) => mapRogueCardToScreen(lx, ly, cardCx, cardCy, s);
      const titleY = y + 44;
      const cTitle = m(x + w / 2, titleY);
      const blockY = y + 80;
      const wrapW = Math.max(32, (w - 36) * s);
      const lines = wrapHintTextLines(
        card.desc,
        wrapW,
        `bold ${ROGUE_DESC_PX}px Microsoft YaHei`
      );
      const maxLines = 5;
      const titleGrad = (() => {
        const a = m(x + 12, titleY);
        const b = m(x + w - 12, titleY);
        const g = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
        g.addColorStop(0, th.titleGrad0);
        g.addColorStop(0.5, th.titleGrad1);
        g.addColorStop(1, th.titleGrad0);
        return g;
      })();

      ctx.save();
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = `bold ${ROGUE_TITLE_PX}px Microsoft YaHei`;
      ctx.lineWidth = 4;
      ctx.strokeStyle = "rgba(0,0,0,0.5)";
      ctx.strokeText(card.title, cTitle.x, cTitle.y);
      ctx.fillStyle = titleGrad;
      ctx.fillText(card.title, cTitle.x, cTitle.y);

      ctx.font = `bold ${ROGUE_DESC_PX}px Microsoft YaHei`;
      let ly = blockY + 22;
      lines.slice(0, maxLines).forEach((ln) => {
        const p = m(x + w / 2, ly);
        ctx.lineWidth = 2.2;
        ctx.strokeStyle = "rgba(0,0,0,0.42)";
        ctx.strokeText(ln, p.x, p.y);
        ctx.fillStyle = "rgba(255, 252, 245, 0.94)";
        ctx.fillText(ln, p.x, p.y);
        ly += ROGUE_DESC_LINE_GAP;
      });
      ctx.restore();
    }

    function drawRogueOverlay() {
      if (!state.roguePick || !state.roguePick.active) return;
      const rp = state.roguePick;
      let overlayAlpha = 1;
      let slideY = 0;
      if (rp.phase === "opening") {
        const t = Math.min(1, rp.phaseT / ROGUE_PICK_OPEN_DURATION);
        const e = easeOutCubic(t);
        overlayAlpha = e;
        slideY = (1 - e) * 56;
      } else if (rp.phase === "closing") {
        const t = Math.min(1, rp.phaseT / ROGUE_PICK_CLOSE_DURATION);
        const e = easeInCubic(t);
        overlayAlpha = 1 - e;
        slideY = e * 32;
      }

      ctx.save();
      ctx.globalAlpha = overlayAlpha;
      ctx.fillStyle = "rgba(8, 12, 22, 0.78)";
      ctx.fillRect(0, 0, W, H);

      const cardW = 218;
      const cardH = 300;
      const gap = 14;
      const totalW = 3 * cardW + 2 * gap;
      const startX = (W - totalW) / 2;
      const cy = H / 2 - 6;
      /** 顶栏在卡阵上方、靠近屏上区（无角标后整体上移） */
      const ROGUE_OVERLAY_TITLE_LIFT = 100;
      const pickTitleY = cy - cardH / 2 - 46 - ROGUE_OVERLAY_TITLE_LIFT + slideY * 0.45;
      const titleOpen = rp.phase === "opening" ? Math.min(1, Math.max(0, rp.phaseT - 0.05) / 0.2) : 1;
      const titleE = easeOutCubic(clamp(titleOpen, 0, 1));

      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.save();
      ctx.globalAlpha = overlayAlpha * (0.55 + 0.45 * titleE);
      ctx.font = `bold ${ROGUE_OVERLAY_TITLE_PX}px Microsoft YaHei`;
      ctx.lineJoin = "round";
      ctx.lineWidth = Math.max(2.2, ROGUE_OVERLAY_TITLE_PX * 0.1);
      ctx.translate(0, (1 - titleE) * 10);
      ctx.strokeStyle = "rgba(0,0,0,0.55)";
      ctx.strokeText("选择一张增益卡牌", W / 2, pickTitleY);
      ctx.fillStyle = "#fef6e0";
      ctx.fillText("选择一张增益卡牌", W / 2, pickTitleY);
      ctx.restore();
      state.roguePick.cardHitRects = [];
      const staggerSec = 0.1;
      const openSpan = Math.max(0.2, ROGUE_PICK_OPEN_DURATION - staggerSec * 2);
      const nowMs = performance.now();

      const floatAmp = 6;
      const floatSec = 0.0021;
      ROGUE_CARDS.forEach((card, i) => {
        const x = startX + i * (cardW + gap);
        const y = cy - cardH / 2;
        let yDraw = y + slideY;
        if (rp.phase === "opening") {
          const t0 = Math.max(0, (rp.phaseT - i * staggerSec) / openSpan);
          const u = Math.min(1, t0);
          const eI = easeOutBack(u);
          yDraw += (1 - eI) * 56;
        }
        /** 固定尺寸；展示/关闭时用轻微上下浮动，相位错开 */
        if (rp.phase === "shown" || rp.phase === "closing") {
          yDraw += floatAmp * Math.sin(nowMs * floatSec + i * 0.9);
        }
        if (rp.phase === "shown") {
          state.roguePick.cardHitRects.push({ x, y: yDraw, w: cardW, h: cardH });
        }

        const cx = x + cardW / 2;
        const ccy = yDraw + cardH / 2;
        drawRogueCardBackground(ctx, x, yDraw, cardW, cardH, card);
        drawRogueCardText(ctx, x, yDraw, cardW, cardH, card, cx, ccy, 1);
      });
      ctx.restore();
    }

    function drawResult() {
      if (!state.gameOver) return;
      ctx.fillStyle = "#00000099";
      ctx.fillRect(0, 0, W, H);

      const cy = H / 2;
      drawRoundedRect(100, cy - 188, W - 200, 356, 20, "#1b2330", "#ffffff99");
      ctx.textAlign = "center";
      ctx.textBaseline = "alphabetic";
      ctx.fillStyle = state.win ? "#67ff7f" : "#ff7676";
      ctx.font = "bold 56px Microsoft YaHei";
      ctx.fillText(state.win ? "挑战成功" : "挑战失败", W / 2, cy - 88);

      ctx.fillStyle = "#fff";
      ctx.font = "32px Microsoft YaHei";
      ctx.fillText(`击败怪物: ${state.kills}`, W / 2, cy - 18);
      ctx.fillText(`到达关卡: ${state.round}`, W / 2, cy + 28);

      const b = state.btnRect;
      drawRoundedRect(b.x, b.y, b.w, b.h, 14, "#2ecc71", "#ffffffcc");
      ctx.fillStyle = "#102611";
      ctx.font = "bold 32px Microsoft YaHei";
      ctx.fillText("重新开始", W / 2, b.y + 46);
    }

    function draw() {
      let shakeX = 0;
      let shakeY = 0;
      if (state.shakeStrength > 0) {
        shakeX = rand(-state.shakeStrength, state.shakeStrength);
        shakeY = rand(-state.shakeStrength, state.shakeStrength);
      }

      ctx.save();
      ctx.translate(shakeX, shakeY);
      if (battleBgReady && battleBgImage.naturalWidth > 0) {
        ctx.drawImage(battleBgImage, 0, 0, W, H);
      } else {
        ctx.fillStyle = "#50c9ce";
        ctx.fillRect(0, 0, W, BATTLE_TOP);
        drawBattleField();
      }
      drawHud();
      drawRogueBuffPips();
      drawEnemyBullets();
      drawCombo();
      drawMonsters();
      drawLaserBeams();
      drawDamageTexts();
      drawEggs();
      drawBombs();
      drawExplosions();
      drawMultiKillBanner();
      drawTurnAnnounceBanner();
      drawAimLine();
      drawRogueOverlay();
      drawResult();
      ctx.restore();
    }

    function getCanvasPoint(ev) {
      const rect = canvas.getBoundingClientRect();
      const x = ((ev.clientX - rect.left) / rect.width) * W;
      const y = ((ev.clientY - rect.top) / rect.height) * H;
      return { x, y };
    }

    function onPointerDown(ev) {
      unlockGameAudio();
      const p = getCanvasPoint(ev);

      if (state.roguePick && state.roguePick.active) {
        if (state.roguePick.phase !== "shown") return;
        const rects = state.roguePick.cardHitRects || [];
        for (let i = 0; i < rects.length; i += 1) {
          const r = rects[i];
          if (p.x >= r.x && p.x <= r.x + r.w && p.y >= r.y && p.y <= r.y + r.h) {
            state.roguePick.pendingIdx = i;
            state.roguePick.phase = "closing";
            state.roguePick.phaseT = 0;
            return;
          }
        }
        return;
      }

      if (state.gameOver) {
        const b = state.btnRect;
        if (p.x >= b.x && p.x <= b.x + b.w && p.y >= b.y && p.y <= b.y + b.h) {
          resetGame();
        }
        return;
      }

      if (state.shotsLeft <= 0) return;
      if (p.y < PLAYER_LINE_Y) return;
      state.aiming = true;
      state.aimPos = p;
    }

    function onPointerMove(ev) {
      if (!state.aiming) return;
      const p = getCanvasPoint(ev);
      state.aimPos = p;
    }

    function onPointerUp(ev) {
      if (state.roguePick && state.roguePick.active) return;
      if (!state.aiming || state.shotsLeft <= 0 || state.gameOver) return;
      const p = getCanvasPoint(ev);
      state.aiming = false;

      const origin = getCurrentShootOrigin();
      let dx = p.x - origin.x;
      let dy = p.y - origin.y;
      if (dy < 30) dy = 30;
      const dir = normalize(dx, dy);
      fireEgg(dir);
    }

    const tutorialDismissBtn = document.getElementById("tutorialDismissBtn");
    if (tutorialDismissBtn) {
      tutorialDismissBtn.addEventListener("click", () => {
        hideTutorial();
      });
    }

    canvas.addEventListener("pointerdown", onPointerDown);
    canvas.addEventListener("pointermove", onPointerMove);
    canvas.addEventListener("pointerup", onPointerUp);
    canvas.addEventListener("pointercancel", () => {
      state.aiming = false;
    });

    function renderDebugParams() {
      const debugParams = document.getElementById("debugParams");
      if (!debugParams) return;
      const rows = [
        ["ACTIVE_PHYSICS_PRESET", ACTIVE_PHYSICS_PRESET, "当前启用物理预设"],
        ["physics.eggInitialSpeed", physics.eggInitialSpeed, "发射初速度"],
        ["physics.eggGravity", physics.eggGravity, "重力加速度"],
        ["physics.eggAirDrag", physics.eggAirDrag, "空气阻力"],
        ["physics.eggWallBounceDamp", physics.eggWallBounceDamp, "左右墙反弹衰减"],
        ["physics.eggTopBounceDamp", physics.eggTopBounceDamp, "顶边反弹衰减"],
        ["physics.eggMonsterBounceDamp", physics.eggMonsterBounceDamp, "怪物反弹基础保速"],
        ["physics.eggHitDownBias", physics.eggHitDownBias, "怪物碰撞向下偏置"],
        ["BOUNCE_FORCE_RANDOM_MIN", BOUNCE_FORCE_RANDOM_MIN, "墙体反弹随机下限"],
        ["BOUNCE_FORCE_RANDOM_MAX", BOUNCE_FORCE_RANDOM_MAX, "墙体反弹随机上限"],
        ["MONSTER_BOUNCE_RANDOM_MIN", MONSTER_BOUNCE_RANDOM_MIN, "怪物反弹随机下限"],
        ["MONSTER_BOUNCE_RANDOM_MAX", MONSTER_BOUNCE_RANDOM_MAX, "怪物反弹随机上限"],
        ["MONSTER_MIN_OUTWARD_REBOUND_SPEED", MONSTER_MIN_OUTWARD_REBOUND_SPEED, "怪物碰撞外向反弹底线"],
        ["MONSTER_MIN_UPWARD_REBOUND_SPEED", MONSTER_MIN_UPWARD_REBOUND_SPEED, "怪物碰撞向上反弹底线"],
        ["MONSTER_MIN_REBOUND_SPEED", MONSTER_MIN_REBOUND_SPEED, "怪物碰撞总速度底线"],
        ["MONSTER_REBOUND_KEEP_RATIO", MONSTER_REBOUND_KEEP_RATIO, "怪物碰撞速度保留比例"],
        ["FOLLOWUP_MONSTER_REBOUND_BOOST", FOLLOWUP_MONSTER_REBOUND_BOOST, "后续撞怪反弹额外增幅"],
        ["FOLLOWUP_MONSTER_MIN_REBOUND_SPEED", FOLLOWUP_MONSTER_MIN_REBOUND_SPEED, "后续撞怪最小总速度"],
        ["FOLLOWUP_MONSTER_MIN_UPWARD_REBOUND_SPEED", FOLLOWUP_MONSTER_MIN_UPWARD_REBOUND_SPEED, "后续撞怪最小向上速度"],
        ["MONSTER_MIN_TOTAL_REBOUND_SPEED", MONSTER_MIN_TOTAL_REBOUND_SPEED, "旧总速度底线开关"],
        ["MONSTER_HIT_COOLDOWN", MONSTER_HIT_COOLDOWN, "怪物碰撞冷却时间"],
        ["FIRST_BOUNCE_UPWARD_SPEED_CAP_FACTOR", FIRST_BOUNCE_UPWARD_SPEED_CAP_FACTOR, "首次反弹向上上限比例"],
        ["NEXT_BOUNCE_UPWARD_SPEED_CAP_FACTOR", NEXT_BOUNCE_UPWARD_SPEED_CAP_FACTOR, "后续反弹向上上限比例"],
        ["BOUNCE_SPEED_GAIN_PER_HIT", BOUNCE_SPEED_GAIN_PER_HIT, "每次反弹叠速增量"],
        ["BOUNCE_SPEED_GAIN_MAX", BOUNCE_SPEED_GAIN_MAX, "反弹叠速上限"],
        ["EGG_FINAL_SPEED_MULTIPLIER", EGG_FINAL_SPEED_MULTIPLIER, "全局位移倍率"],
        ["AIM_PREDICT_STEPS", AIM_PREDICT_STEPS, "轨迹预测步数"],
        ["AIM_PREDICT_DT", AIM_PREDICT_DT, "轨迹预测步长"],
        ["AIM_PREDICT_SUB_STEPS", AIM_PREDICT_SUB_STEPS, "每步内细分（防引线穿鼠）"],
        ["EGG_RADIUS", EGG_RADIUS, "子弹半径"],
        ["debugSuppressChest", state.debugSuppressChest, "调试用：隐藏宝箱且不再刷新（需重新开始）"]
      ];
      debugParams.textContent = rows
        .map(([key, value, note]) => `${key}: ${value}\n- ${note}`)
        .join("\n\n");
    }

    const debugRestartBtn = document.getElementById("debugRestartBtn");
    if (debugRestartBtn) {
      debugRestartBtn.addEventListener("click", () => {
        resetGame();
      });
    }
    const debugRound2Btn = document.getElementById("debugRound2Btn");
    if (debugRound2Btn) {
      debugRound2Btn.addEventListener("click", () => {
        jumpToDebugRound2();
      });
    }
    const debugBossLevelBtn = document.getElementById("debugBossLevelBtn");
    if (debugBossLevelBtn) {
      debugBossLevelBtn.addEventListener("click", () => {
        jumpToDebugBossLevel();
      });
    }
    const debugHideChestBtn = document.getElementById("debugHideChestBtn");
    if (debugHideChestBtn) {
      debugHideChestBtn.addEventListener("click", () => {
        state.debugSuppressChest = true;
        state.monsters = state.monsters.filter((m) => m.type !== "chest");
        renderDebugParams();
      });
    }
    const catTestButtons = document.querySelectorAll(".cat-test-btn");
    const catTooltip = document.getElementById("catTooltip");

    function hideCatTooltip() {
      if (!catTooltip) return;
      catTooltip.classList.remove("show");
      catTooltip.setAttribute("aria-hidden", "true");
    }

    function showCatTooltip(btn, eventX, eventY) {
      if (!catTooltip) return;
      const catName = btn.getAttribute("data-cat-name");
      const text = CAT_TOOLTIP_TEXT[catName];
      if (!text) return;
      catTooltip.textContent = text;
      catTooltip.classList.add("show");
      catTooltip.setAttribute("aria-hidden", "false");

      const pad = 14;
      const boxW = catTooltip.offsetWidth;
      const boxH = catTooltip.offsetHeight;
      let left = eventX + 12;
      let top = eventY + 12;
      if (left + boxW > window.innerWidth - pad) {
        left = Math.max(pad, eventX - boxW - 12);
      }
      if (top + boxH > window.innerHeight - pad) {
        top = Math.max(pad, eventY - boxH - 12);
      }
      catTooltip.style.left = `${left}px`;
      catTooltip.style.top = `${top}px`;
    }

    catTestButtons.forEach((btn) => {
      btn.addEventListener("click", () => {
        const catName = btn.getAttribute("data-cat-name");
        const config = CAT_TEST_CONFIGS[catName];
        if (!config) return;
        state.cats = [{ ...config }];
        resetGame();
      });
      btn.addEventListener("mouseenter", (ev) => {
        showCatTooltip(btn, ev.clientX, ev.clientY);
      });
      btn.addEventListener("mousemove", (ev) => {
        showCatTooltip(btn, ev.clientX, ev.clientY);
      });
      btn.addEventListener("mouseleave", hideCatTooltip);
    });
    renderDebugParams();

    let last = performance.now();
    function loop(now) {
      const dt = Math.min(0.033, (now - last) / 1000);
      last = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }
  </script>
</body>
